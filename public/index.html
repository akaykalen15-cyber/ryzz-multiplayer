<!DOCTYPE html>
<html>
<head>
    <title>RYZZ.io - Fixed</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #joinScreen {
            background: #111827;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }
        #gameScreen {
            background: #111827;
            padding: 0;
            border-radius: 16px;
        }
        #joinScreen h1 {
            color: #fbbf24;
            margin-bottom: 20px;
            font-size: 36px;
            text-shadow: 0 0 10px #fbbf24;
            animation: titlePulse 2s ease-in-out infinite;
        }
        @keyframes titlePulse {
            0% { text-shadow: 0 0 10px #fbbf24; }
            50% { text-shadow: 0 0 20px #fbbf24, 0 0 30px #f59e0b; }
            100% { text-shadow: 0 0 10px #fbbf24; }
        }
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            color: #ffffff;
            caret-color: #fbbf24;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            min-width: 200px;
        }
        .input-group input:focus {
            border-color: #fbbf24;
        }
        #joinBtn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        #joinBtn:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .stats-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .coin-display {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 30px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #1f2937;
            font-size: 20px;
            animation: coinGlow 1.5s ease-in-out infinite;
        }
        @keyframes coinGlow {
            0% { box-shadow: 0 0 5px #fbbf24; }
            50% { box-shadow: 0 0 20px #fbbf24; }
            100% { box-shadow: 0 0 5px #fbbf24; }
        }
        .streak-display {
            background: #1f2937;
            border-radius: 30px;
            padding: 10px 20px;
            color: #fbbf24;
            font-weight: bold;
            border: 1px solid #fbbf24;
        }
        /* LARGER RICHEST LEADERBOARD */
        .leaderboard-container {
            background: linear-gradient(135deg, #1f2937, #111827);
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #fbbf24;
        }
        .leaderboard-container h3 {
            color: #fbbf24;
            font-size: 20px;
            margin-bottom: 12px;
            text-align: center;
            text-shadow: 0 0 5px #fbbf24;
        }
        .leaderboard-list {
            max-height: 250px;
            overflow-y: auto;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #374151;
            font-size: 14px;
            color: white;
        }
        .leaderboard-item.top-1 {
            background: linear-gradient(90deg, #ffd70020, #ffd70008);
            color: #ffd700;
            font-weight: bold;
            font-size: 16px;
        }
        .leaderboard-item.top-2 {
            background: linear-gradient(90deg, #c0c0c020, #c0c0c008);
            color: #c0c0c0;
            font-weight: bold;
        }
        .leaderboard-item.top-3 {
            background: linear-gradient(90deg, #cd7f3220, #cd7f3208);
            color: #cd7f32;
            font-weight: bold;
        }
        /* SKIN SHOP TOGGLE */
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0 10px;
            border-top: 1px solid #374151;
            padding-top: 10px;
        }
        .shop-title {
            color: #fbbf24;
            font-size: 18px;
        }
        .toggle-shop-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .toggle-shop-btn:hover {
            background: #2563eb;
        }
        .skin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
            transition: all 0.3s ease;
        }
        .skin-grid.collapsed {
            display: none;
        }
        .skin-card {
            background: #1f2937;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            border: 2px solid #374151;
            transition: all 0.2s;
            cursor: pointer;
        }
        .skin-card:hover {
            transform: translateY(-2px);
        }
        .skin-card.owned {
            border-color: #fbbf24;
            background: #2d3a4e;
        }
        .skin-card.equipped {
            border-color: #3b82f6;
            background: #1e3a5f;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }
        .skin-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 5px;
        }
        .skin-name {
            font-size: 11px;
            color: white;
            font-weight: bold;
        }
        .skin-price {
            font-size: 10px;
            color: #fbbf24;
            margin: 3px 0;
        }
        .skin-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 10px;
            margin: 2px;
            width: 50px;
        }
        .skin-btn:hover {
            background: #2563eb;
        }
        .skin-btn.owned-btn {
            background: #22c55e;
        }
        .challenges-container {
            background: #1f2937;
            border-radius: 12px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #374151;
        }
        .challenges-container h3 {
            color: #fbbf24;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .challenge-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            background: #111827;
            margin: 5px 0;
            border-radius: 6px;
            font-size: 11px;
        }
        .daily-bonus {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 12px;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .daily-bonus:hover {
            transform: scale(1.02);
        }
        .daily-bonus.claimed {
            background: #374151;
            cursor: default;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 3px;
        }
        #gameContainer {
            position: relative;
            display: inline-block;
        }
        canvas {
            border: 2px solid #1f2937;
            display: block;
            border-radius: 8px;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
            z-index: 10;
            pointer-events: none;
        }
        .stats, #leaderboard, #allTimeLeaderboard, #zoomControl {
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 5px 10px;
            border-radius: 8px;
            color: white;
            font-size: 10px;
            border: 1px solid #374151;
        }
        .stats span {
            color: #fbbf24;
            font-weight: bold;
        }
        .admin-glowing {
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 5px #ffffff, 0 0 10px #ffffff, 0 0 15px #fbbf24;
            animation: adminPulse 1.5s ease-in-out infinite;
        }
        @keyframes adminPulse {
            0% { text-shadow: 0 0 5px #ffffff, 0 0 10px #ffffff; }
            50% { text-shadow: 0 0 10px #ffffff, 0 0 20px #fbbf24, 0 0 30px #fbbf24; }
            100% { text-shadow: 0 0 5px #ffffff, 0 0 10px #ffffff; }
        }
        #leaderboard, #allTimeLeaderboard { min-width: 120px; }
        #leaderboard h4, #allTimeLeaderboard h4 { margin-bottom: 3px; color: #fbbf24; font-size: 10px; }
        #leaderboardList, #allTimeList { max-height: 70px; overflow-y: auto; font-size: 9px; }
        #zoomControl button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 2px 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
        }
        #sizeBarContainer { width: 40px; height: 4px; background: #374151; border-radius: 3px; display: inline-block; margin-left: 4px; }
        #sizeBar { height: 100%; width: 0%; background: linear-gradient(90deg,#3b82f6,#fbbf24); border-radius: 3px; }
        #chatOverlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 240px;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #374151;
            z-index: 10;
        }
        #chatMessages { height: 70px; overflow-y: auto; padding: 5px; font-size: 9px; color: #ccc; }
        #chatInputArea { display: flex; padding: 5px; gap: 5px; border-top: 1px solid #374151; }
        #chatInput { flex:1; background:#1f2937; border:1px solid #374151; color:white; padding:3px 5px; border-radius:4px; font-size:9px; }
        #chatSend { background:#3b82f6; border:none; color:white; padding:3px 6px; border-radius:4px; cursor:pointer; font-size:9px; }
        .chat-admin { color:#fbbf24; font-weight:bold; }
        .chat-system { color:#ef4444; font-style:italic; }
        .hidden { display: none; }
        .controls-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 8px;
            color: #888;
            pointer-events: none;
        }
        #adminPanel {
            position: absolute;
            top: 60px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 10px;
            padding: 6px;
            border: 1px solid #fbbf24;
            z-index: 20;
            pointer-events: auto;
            min-width: 120px;
        }
        #adminPanel h4 { color: #fbbf24; font-size: 9px; margin-bottom: 4px; text-align: center; }
        .admin-btn { background:#3b82f6; border:none; color:white; padding:2px 5px; border-radius:4px; cursor:pointer; font-size:8px; margin:2px; width:50px; }
        .admin-btn-danger { background:#ef4444; }
        .admin-btn-gold { background:#fbbf24; color:#111827; }
        .player-select { background:#1f2937; border:1px solid #374151; color:white; padding:2px 4px; border-radius:4px; font-size:8px; width:100%; margin-bottom:4px; }
        
        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 1; }
            100% { transform: translateY(-30px) translateX(10px); opacity: 0; }
        }
        @keyframes streakPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #ffd700; }
            100% { transform: scale(1); }
        }
        .streak-pulse {
            animation: streakPulse 0.5s ease-in-out;
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>👑 RYZZ.io</h1>
    
    <div class="input-group">
        <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20" autocomplete="off">
        <input type="password" id="passwordInput" placeholder="Admin password" autocomplete="off">
    </div>
    
    <div class="stats-container">
        <div class="coin-display">
            <span>🪙</span>
            <span id="coinAmount">0</span>
            <span>coins</span>
        </div>
        <div class="streak-display">
            🔥 Day <span id="streakDay">1</span>
        </div>
    </div>
    
    <!-- Daily Bonus -->
    <div id="dailyBonus" class="daily-bonus">
        🎁 DAILY BONUS - Claim <span id="dailyBonusAmount">100</span> coins!
    </div>
    
    <!-- Challenges -->
    <div class="challenges-container">
        <h3>⚡ DAILY CHALLENGES</h3>
        <div id="challengesList"></div>
    </div>
    
    <!-- LARGER RICHEST LEADERBOARD -->
    <div class="leaderboard-container">
        <h3>🏆 RICHEST PLAYERS 🏆</h3>
        <div id="richestLeaderboard" class="leaderboard-list"></div>
    </div>
    
    <!-- SKIN SHOP WITH TOGGLE -->
    <div class="shop-header">
        <div class="shop-title">🎨 SKIN SHOP</div>
        <button id="toggleShopBtn" class="toggle-shop-btn">▼ HIDE</button>
    </div>
    <div id="skinGrid" class="skin-grid"></div>
    
    <button id="joinBtn">🚀 JOIN GAME</button>
    <div id="errorMsg"></div>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <div id="adminPanel" class="hidden">
            <h4>👑 ADMIN PANEL</h4>
            <select id="playerSelect" class="player-select">
                <option value="">-- Select Player --</option>
            </select>
            <div style="display:flex; flex-wrap:wrap; gap:2px; justify-content:center;">
                <button class="admin-btn" data-points="100">+100</button>
                <button class="admin-btn" data-points="500">+500</button>
                <button class="admin-btn" data-points="1000">+1K</button>
                <button class="admin-btn" data-points="5000">+5K</button>
                <button class="admin-btn" data-points="10000">+10K</button>
                <button class="admin-btn admin-btn-gold" data-points="50000">+50K</button>
                <button class="admin-btn admin-btn-gold" data-points="100000">+100K</button>
                <button class="admin-btn" id="adminHealBtn">💚 Heal</button>
                <button class="admin-btn" id="adminMaxSizeBtn">💪 Max</button>
                <button class="admin-btn" id="adminSpawnOrbsBtn">🟡 Orbs</button>
                <button class="admin-btn admin-btn-danger" id="adminKickBtn">👢 Kick</button>
                <button class="admin-btn admin-btn-danger" id="adminBanBtn">🔨 Ban</button>
            </div>
        </div>
        
        <div id="ui">
            <div class="stats">🎯 <span id="scoreValue">0</span></div>
            <div class="stats">🏆 <span id="bestValue">0</span></div>
            <div class="stats">⚔️ <span id="killsValue">0</span></div>
            <div class="stats">🔥 <span id="streakKills">0</span></div>
            <div class="stats">📏 <span id="sizeValue">20</span><div id="sizeBarContainer"><div id="sizeBar"></div></div></div>
            <div class="stats">Lvl <span id="levelValue">1</span></div>
            <div class="stats">⚡ <span id="perksValue">0%</span></div>
            <div class="stats">⚡ <span id="activePowerup">None</span></div>
            <div class="stats">👑 <span id="adminName"></span></div>
            <div id="zoomControl">
                <button id="zoomOutBtn">-</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomInBtn">+</button>
                <button id="zoomResetBtn">Reset</button>
            </div>
            <div id="leaderboard">
                <h4>🏆 CURRENT TOP 10</h4>
                <div id="leaderboardList"></div>
            </div>
            <div id="allTimeLeaderboard">
                <h4>🏆 ALL-TIME TOP 10</h4>
                <div id="allTimeList"></div>
            </div>
        </div>
        
        <div id="chatOverlay">
            <div id="chatMessages"><div class="chat-system">🔔 Welcome! WASD/Arrows to move.</div></div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Message..." maxlength="100" autocomplete="off">
                <button id="chatSend">Send</button>
            </div>
        </div>
        <div class="controls-hint">⬆️ WASD / Arrows | 🖱️ Mouse | Scroll zoom</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== COIN PREFIX FUNCTION ==========
    function formatCoins(coins) {
        if (coins >= 1_000_000_000) return (coins / 1_000_000_000).toFixed(1) + 'B';
        if (coins >= 1_000_000) return (coins / 1_000_000).toFixed(1) + 'M';
        if (coins >= 1_000) return (coins / 1_000).toFixed(1) + 'K';
        return coins.toString();
    }
    
    // ========== SKIN SHOP TOGGLE ==========
    let skinShopVisible = localStorage.getItem('skinShopVisible') !== 'false';
    
    function toggleSkinShop() {
        skinShopVisible = !skinShopVisible;
        localStorage.setItem('skinShopVisible', skinShopVisible);
        const skinGrid = document.getElementById('skinGrid');
        const toggleBtn = document.getElementById('toggleShopBtn');
        if (skinShopVisible) {
            skinGrid.classList.remove('collapsed');
            toggleBtn.innerHTML = '▼ HIDE';
        } else {
            skinGrid.classList.add('collapsed');
            toggleBtn.innerHTML = '▶ SHOW';
        }
    }
    
    // ========== DAILY STREAK SYSTEM ==========
    let streakDay = parseInt(localStorage.getItem('ryzzStreakDay')) || 1;
    let lastClaimDate = localStorage.getItem('ryzzLastClaim');
    let today = new Date().toDateString();
    
    function checkDailyBonus() {
        const dailyBonusDiv = document.getElementById('dailyBonus');
        const bonusAmount = 100 * streakDay;
        document.getElementById('dailyBonusAmount').innerText = formatCoins(bonusAmount);
        
        if (lastClaimDate === today) {
            dailyBonusDiv.classList.add('claimed');
            dailyBonusDiv.innerHTML = `✅ Daily bonus claimed! Come back tomorrow for ${formatCoins(bonusAmount)} coins!`;
            dailyBonusDiv.style.cursor = 'default';
            dailyBonusDiv.onclick = null;
        } else {
            dailyBonusDiv.classList.remove('claimed');
            dailyBonusDiv.innerHTML = `🎁 DAY ${streakDay} BONUS - Claim ${formatCoins(bonusAmount)} coins!`;
            dailyBonusDiv.style.cursor = 'pointer';
            dailyBonusDiv.onclick = () => claimDailyBonus();
        }
        document.getElementById('streakDay').innerText = streakDay;
    }
    
    function claimDailyBonus() {
        const today = new Date().toDateString();
        if (lastClaimDate === today) return;
        
        const bonusAmount = 100 * streakDay;
        addCoins(bonusAmount);
        
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        if (lastClaimDate === yesterday.toDateString()) {
            streakDay++;
        } else {
            streakDay = 1;
        }
        
        localStorage.setItem('ryzzStreakDay', streakDay);
        localStorage.setItem('ryzzLastClaim', today);
        lastClaimDate = today;
        
        showFloatingText(`+${formatCoins(bonusAmount)} 🪙 Daily Bonus!`, '#fbbf24');
        checkDailyBonus();
        updateRichestLeaderboard();
    }
    
    // ========== DAILY CHALLENGES ==========
    let dailyChallenges = JSON.parse(localStorage.getItem('ryzzChallenges'));
    let lastChallengeDate = localStorage.getItem('ryzzChallengeDate');
    
    function generateDailyChallenges() {
        const challengeTypes = [
            { name: 'Collect 50 orbs', target: 50, type: 'orbs', reward: 200 },
            { name: 'Eat 10 players', target: 10, type: 'eats', reward: 300 },
            { name: 'Reach 10,000 score', target: 10000, type: 'score', reward: 500 },
            { name: 'Survive 5 minutes', target: 5, type: 'time', reward: 400 },
            { name: 'Kill 5 bots', target: 5, type: 'botKills', reward: 250 },
            { name: 'Collect 100 coins', target: 100, type: 'coins', reward: 200 },
            { name: 'Level up 3 times', target: 3, type: 'levels', reward: 600 },
            { name: 'Eat a boss', target: 1, type: 'boss', reward: 1000 }
        ];
        
        const shuffled = [...challengeTypes];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        dailyChallenges = shuffled.slice(0, 3).map(c => ({
            ...c,
            progress: 0,
            completed: false,
            claimed: false
        }));
        
        localStorage.setItem('ryzzChallenges', JSON.stringify(dailyChallenges));
        localStorage.setItem('ryzzChallengeDate', new Date().toDateString());
        renderChallenges();
    }
    
    function renderChallenges() {
        const container = document.getElementById('challengesList');
        if (!container) return;
        
        if (!dailyChallenges || lastChallengeDate !== new Date().toDateString()) {
            generateDailyChallenges();
        }
        
        container.innerHTML = '';
        for (const challenge of dailyChallenges) {
            const div = document.createElement('div');
            div.className = 'challenge-item';
            div.innerHTML = `
                <span style="flex:1">${challenge.name}</span>
                <span style="width:60px; text-align:center">${challenge.progress}/${challenge.target}</span>
                ${challenge.completed && !challenge.claimed ? 
                    `<button class="skin-btn" data-challenge="${challenge.name}">Claim ${formatCoins(challenge.reward)}</button>` : 
                    challenge.claimed ? 
                    '<span class="challenge-completed">✅ Claimed</span>' : 
                    `<span>🪙 ${formatCoins(challenge.reward)}</span>`
                }
            `;
            if (challenge.completed && !challenge.claimed) {
                const btn = div.querySelector('button');
                if (btn) {
                    btn.onclick = () => claimChallengeReward(challenge);
                }
            }
            container.appendChild(div);
        }
    }
    
    function updateChallengeProgress(type, amount = 1) {
        if (!dailyChallenges) return;
        let updated = false;
        for (const challenge of dailyChallenges) {
            if (!challenge.completed && challenge.type === type) {
                challenge.progress += amount;
                if (challenge.progress >= challenge.target) {
                    challenge.completed = true;
                    showFloatingText(`🎯 Challenge Complete: ${challenge.name}!`, '#22c55e');
                }
                updated = true;
            }
        }
        if (updated) {
            localStorage.setItem('ryzzChallenges', JSON.stringify(dailyChallenges));
            renderChallenges();
        }
    }
    
    function claimChallengeReward(challenge) {
        if (!challenge.completed || challenge.claimed) return;

    function formatScore(score) {
        if (score >= 1_000_000_000) return (score / 1_000_000_000).toFixed(1) + 'B';

    }
    
    function formatPerks(perks) {
        if (!perks) return '0%';
        const speed = Math.round((perks.speedMultiplier - 1) * 100);
        const size = Math.round((perks.sizeMultiplier - 1) * 100);
        const score = Math.round((perks.scoreMultiplier - 1) * 100);
        const range = Math.round((perks.eatRangeMultiplier - 1) * 100);
        if (speed === 0 && size === 0 && score === 0 && range === 0) return '0%';
        let parts = [];
        if (speed > 0) parts.push(`⚡+${speed}%`);
        if (size > 0) parts.push(`💪+${size}%`);
        if (score > 0) parts.push(`💰+${score}%`);
        if (range > 0) parts.push(`🎯+${range}%`);
        return parts.join(' ');
    }

    window.addEventListener('keydown', (e) => {
        const key = e.key;
        if (keys.hasOwnProperty(key)) { keys[key] = true; useMouse = false; e.preventDefault(); }
        if (key === 'w') keys.w = true;
        if (key === 'a') keys.a = true;
        if (key === 's') keys.s = true;
        if (key === 'd') keys.d = true;
    });
    
    window.addEventListener('keyup', (e) => {
        const key = e.key;
        if (keys.hasOwnProperty(key)) keys[key] = false;
        if (key === 'w') keys.w = false;
        if (key === 'a') keys.a = false;
        if (key === 's') keys.s = false;
        if (key === 'd') keys.d = false;
    });
    
    function getMoveVector() {
        let moveX = 0, moveY = 0;
        if (keys.ArrowUp || keys.w) moveY -= 1;
        if (keys.ArrowDown || keys.s) moveY += 1;
        if (keys.ArrowLeft || keys.a) moveX -= 1;
        if (keys.ArrowRight || keys.d) moveX += 1;
        if (moveX !== 0 || moveY !== 0) { const len = Math.hypot(moveX, moveY); moveX /= len; moveY /= len; }
        return { x: moveX, y: moveY };
    }
    
    canvas.addEventListener('mousemove', (e) => {
        useMouse = true;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        mouseX = (canvasX / zoom) + cameraX;
        mouseY = (canvasY / zoom) + cameraY;
        mouseX = Math.min(Math.max(mouseX, 0), MAP_WIDTH);
        mouseY = Math.min(Math.max(mouseY, 0), MAP_HEIGHT);
    });

                levelElement.innerText = currentLevel;
                levelTitleElement.innerText = currentTitle;
                perksElement.innerHTML = formatPerks(currentPerks);
                if (myPlayer.isAdmin) addChatMessage('System', '👑 You are ADMIN! Use the panel on the right!', false, true);
                kills = myPlayer.kills || 0;
                killsElement.innerText = kills;
                if (streakKillsElement) streakKillsElement.innerText = 0;
                activePowerup = myPlayer.activePowerup;
                powerupEndTime = myPlayer.powerupEndTime;
            }
        }
    });
    
    socket.on('currentBots', (serverBots) => { for (const id in serverBots) players[id] = { ...serverBots[id], isBot: true }; updatePlayerSelect(); });
    socket.on('updateBots', (serverBots) => {
        for (const id in players) if (players[id].isBot && !serverBots[id]) delete players[id];
        for (const id in serverBots) players[id] = { ...serverBots[id], isBot: true };
        updatePlayerSelect();
    });
    socket.on('currentOrbs', (serverOrbs) => { orbs = serverOrbs; collectingOrbIds.clear(); });
    socket.on('mapSizeUpdate', (data) => { MAP_WIDTH = data.width; MAP_HEIGHT = data.height; });
    socket.on('newPlayer', (playerData) => { players[playerData.id] = playerData; updatePlayerSelect(); addChatMessage('System', `${playerData.username} joined!`, false, true); });
    socket.on('playerMoved', (playerData) => { if (players[playerData.id]) { players[playerData.id].x = playerData.x; players[playerData.id].y = playerData.y; } });
    socket.on('playerDisconnected', (playerId) => { if (players[playerId]) { addChatMessage('System', `${players[playerId].username} left`, false, true); delete players[playerId]; updatePlayerSelect(); } });
    
    socket.on('leaderboardUpdate', (leaderboard) => {
        let html = '';
        for (let i = 0; i < leaderboard.length; i++) {
            const p = leaderboard[i];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
            html += `<div>${medal} ${p.username} - ${formatScore(p.score)} (Lvl ${p.level})</div>`;
        }
        leaderboardList.innerHTML = html;
    });
    
    socket.on('scoreUpdate', (data) => {
        if (players[data.id]) {
            players[data.id].score = data.score;
            players[data.id].radius = data.radius;
            players[data.id].level = data.level;
            players[data.id].title = data.title;
            players[data.id].perks = data.perks;
            if (data.kills !== undefined) players[data.id].kills = data.kills;
            players[data.id].activePowerup = data.activePowerup;
            players[data.id].powerupEndTime = data.powerupEndTime;
            updatePlayerSelect();
        }
        if (data.id === myId) {
            if (data.score > currentScore) {
                const oldScore = currentScore;
                currentScore = data.score;
                scoreElement.innerText = formatScore(currentScore);
                
                checkAndAwardCoins(currentScore);
                updateChallengeProgress('score', currentScore - oldScore);
                
                if (currentScore > personalBest) {
                    personalBest = currentScore;
                    localStorage.setItem('ryzzPersonalBest', personalBest);
                    bestElement.innerText = formatScore(personalBest);
                    addChatMessage('System', `🏆 NEW PERSONAL BEST! ${formatScore(personalBest)}`, false, true);
                    showFloatingText('NEW RECORD! 🏆', '#fbbf24');
                }
                
                if (Math.floor(currentScore / 1000) > Math.floor(oldScore / 1000)) {
                    const myScreenX = (myPlayer.x - cameraX) * zoom;
                    const myScreenY = (myPlayer.y - cameraY) * zoom;
                    for (let i = 0; i < 20; i++) {
                        addParticle(myScreenX + (Math.random() - 0.5) * 50, myScreenY + (Math.random() - 0.5) * 50, '#fbbf24');
                    }
                }
            }
            if (data.kills !== undefined) { 
                kills = data.kills; 
                killsElement.innerText = kills;
                updateChallengeProgress('eats', 1);
                updateChallengeProgress('botKills', 1);
                updateKillStreak();
            }
            if (myPlayer) { myPlayer.radius = data.radius; updateSizeDisplay(data.radius); }
            if (data.level !== lastLevel) {
                const levelGain = data.level - lastLevel;
                lastLevel = data.level;
                currentLevel = data.level;
                currentTitle = data.title;
                currentPerks = data.perks;
                levelElement.innerText = data.level;
                levelTitleElement.innerText = data.title;
                perksElement.innerHTML = formatPerks(data.perks);
                addChatMessage('System', `🎉 LEVEL UP! You reached ${data.title} (Level ${data.level})!`, false, true);
                showFloatingText(`LEVEL ${data.level}! 🎉`, '#22c55e');
                updateChallengeProgress('levels', levelGain);
                checkLevelReward(data.level);
            } else if (data.perks) { currentPerks = data.perks; perksElement.innerHTML = formatPerks(data.perks); }
            if (data.activePowerup !== undefined) { activePowerup = data.activePowerup; powerupEndTime = data.powerupEndTime; }
        }
    });
    
    socket.on('orbCollected', (orbId) => { collectingOrbIds.delete(orbId); const index = orbs.findIndex(o => o.id === orbId); if (index !== -1) orbs.splice(index, 1); updateChallengeProgress('orbs', 1); });
    socket.on('orbCollectionFailed', (orbId) => { collectingOrbIds.delete(orbId); });
    socket.on('chatMessage', (data) => { addChatMessage(data.username, data.message, data.isAdmin); });
    socket.on('adminConfirm', (isAdmin) => {
        if (isAdmin && myPlayer) {
            myPlayer.isAdmin = true;
            isAdmin = true;
            adminNameSpan.innerText = myPlayer.username;
            adminNameSpan.className = 'admin-glowing';
            adminPanel.classList.remove('hidden');
            setupAdminButtons();
            updatePlayerSelect();
            addChatMessage('System', '👑 You are ADMIN!', false, true);
        }
    });
    socket.on('nameRejected', (msg) => { alert(msg); window.location.reload(); });
    socket.on('kicked', (msg) => { alert(msg); window.location.reload(); });
    socket.on('banned', (msg) => { alert(msg); window.location.reload(); });
    socket.on('deathMessage', (data) => { if (data.victimId === myId) addChatMessage('System', `💀 You were eaten by ${data.killerName}!`, false, true); });
    
    function movePlayer() {
        if (!myPlayer) return;
        let targetX = myPlayer.x, targetY = myPlayer.y;
        if (useMouse && mouseX !== null && mouseY !== null) { targetX = mouseX; targetY = mouseY; }
        else {
            const move = getMoveVector();
            if (move.x !== 0 || move.y !== 0) {
                let rawSpeed = 8 / (myPlayer.radius / 40);
                let baseSpeed = Math.min(8, Math.max(2.5, rawSpeed));
                const speedMultiplier = currentPerks?.speedMultiplier || 1;
                const speed = baseSpeed * speedMultiplier;
                targetX = myPlayer.x + move.x * speed;
                targetY = myPlayer.y + move.y * speed;
            }
        }
        const dx = targetX - myPlayer.x, dy = targetY - myPlayer.y;
        const distance = Math.hypot(dx, dy);
        if (distance > 1) {
            let rawSpeed = 8 / (myPlayer.radius / 40);
            let baseSpeed = Math.min(8, Math.max(2.5, rawSpeed));
            const speedMultiplier = currentPerks?.speedMultiplier || 1;
            const speed = baseSpeed * speedMultiplier;
            myPlayer.x += (dx / distance) * speed;
            myPlayer.y += (dy / distance) * speed;
        }
        myPlayer.x = Math.min(Math.max(myPlayer.x, myPlayer.radius + 5), MAP_WIDTH - myPlayer.radius - 5);
        myPlayer.y = Math.min(Math.max(myPlayer.y, myPlayer.radius + 5), MAP_HEIGHT - myPlayer.radius - 5);
        socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
    }
    
    function checkCollisions() {
        if (!myPlayer) return;
        for (let i = 0; i < orbs.length; i++) {
            const orb = orbs[i];
            if (collectingOrbIds.has(orb.id)) continue;
            if (Math.hypot(myPlayer.x - orb.x, myPlayer.y - orb.y) < myPlayer.radius + orb.radius) {
                collectingOrbIds.add(orb.id);
                socket.emit('collectOrb', orb.id);
                orbs.splice(i, 1);
                currentScore += orb.value;
                scoreElement.innerText = formatScore(currentScore);
                if (myPlayer) myPlayer.score = currentScore;
                if (orb.value >= 350) {
                    const myScreenX = (myPlayer.x - cameraX) * zoom;
                    const myScreenY = (myPlayer.y - cameraY) * zoom;
                    for (let p = 0; p < 15; p++) {
                        addParticle(myScreenX + (Math.random() - 0.5) * 40, myScreenY + (Math.random() - 0.5) * 40, '#fbbf24');
                    }
                }
                break;
            }
        }
        for (let i = 0; i < powerups.length; i++) {
            const powerup = powerups[i];
            if (Math.hypot(myPlayer.x - powerup.x, myPlayer.y - powerup.y) < myPlayer.radius + powerup.radius) {
                socket.emit('collectPowerup', powerup.id);
                powerups.splice(i, 1);
                addChatMessage('System', `⚡ You got a ${powerup.name}!`, false, true);
                const myScreenX = (myPlayer.x - cameraX) * zoom;
                const myScreenY = (myPlayer.y - cameraY) * zoom;
                for (let p = 0; p < 20; p++) {
                    addParticle(myScreenX + (Math.random() - 0.5) * 50, myScreenY + (Math.random() - 0.5) * 50, powerup.color);
                }
                break;
            }
        }
        for (const id in players) {
            if (id === myId) continue;
            const other = players[id];
            if (other.isBot) continue;
            if (Math.hypot(myPlayer.x - other.x, myPlayer.y - other.y) < myPlayer.radius + other.radius) {
                if (myPlayer.radius > other.radius && !other.isAdmin) {
                    kills++;
                    killsElement.innerText = kills;
                    socket.emit('eatPlayer', id);
                    updateKillStreak();
                    addChatMessage('System', `🍽️ You ate ${other.username}! (${kills} kills)`, false, true);
                    const myScreenX = (myPlayer.x - cameraX) * zoom;
                    const myScreenY = (myPlayer.y - cameraY) * zoom;
                    for (let p = 0; p < 25; p++) {
                        addParticle(myScreenX + (Math.random() - 0.5) * 60, myScreenY + (Math.random() - 0.5) * 60, '#ff4444');
                    }
                } else if (other.radius > myPlayer.radius) {
                    socket.emit('eatPlayer', myId);
                    killStreak = 0;
                    if (streakKillsElement) streakKillsElement.innerText = 0;
                    myPlayer.x = Math.random() * (MAP_WIDTH - 400) + 200;
                    myPlayer.y = Math.random() * (MAP_HEIGHT - 400) + 200;
                    socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
                } else {
                    const angle = Math.atan2(myPlayer.y - other.y, myPlayer.x - other.x);
                    myPlayer.x += Math.cos(angle) * 20;
                    myPlayer.y += Math.sin(angle) * 20;
                }
            }
        }
    }
    
    function updateCamera() {
        if (!myPlayer) return;
        const effectiveWidth = canvas.width / zoom;
        const effectiveHeight = canvas.height / zoom;
        cameraX = myPlayer.x - effectiveWidth / 2;
        cameraY = myPlayer.y - effectiveHeight / 2;
        cameraX = Math.min(Math.max(cameraX, 0), MAP_WIDTH - effectiveWidth);
        cameraY = Math.min(Math.max(cameraY, 0), MAP_HEIGHT - effectiveHeight);
    }
    
    function draw() {
        if (!myPlayer) return;
        updateCamera();
        ctx.fillStyle = '#0a0f1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        let gridSize = 200;
        if (zoom < 0.3) gridSize = 500;
        if (zoom < 0.15) gridSize = 1000;
        if (zoom > 1.5) gridSize = 100;
        ctx.strokeStyle = '#1a2340';
        ctx.lineWidth = 1;
        const startX = Math.floor(cameraX / gridSize) * gridSize;
        const startY = Math.floor(cameraY / gridSize) * gridSize;
        for (let x = startX; x < cameraX + canvas.width / zoom; x += gridSize) {
            const screenX = (x - cameraX) * zoom;
            ctx.beginPath(); ctx.moveTo(screenX, 0); ctx.lineTo(screenX, canvas.height); ctx.stroke();
        }
        for (let y = startY; y < cameraY + canvas.height / zoom; y += gridSize) {
            const screenY = (y - cameraY) * zoom;
            ctx.beginPath(); ctx.moveTo(0, screenY); ctx.lineTo(canvas.width, screenY); ctx.stroke();
        }
        
        for (const powerup of powerups) {
            const screenX = (powerup.x - cameraX) * zoom;
            const screenY = (powerup.y - cameraY) * zoom;
            const radius = powerup.radius * zoom;
            if (screenX + radius > 0 && screenX - radius < canvas.width && screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath(); ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                ctx.fillStyle = powerup.color;
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = `${14 * zoom}px Arial`;
                ctx.fillText(powerup.icon, screenX - 6, screenY + 5);
                ctx.shadowBlur = 8 * zoom;
                ctx.shadowColor = powerup.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        for (const orb of orbs) {
            const screenX = (orb.x - cameraX) * zoom;
            const screenY = (orb.y - cameraY) * zoom;
            const radius = orb.radius * zoom;
            if (screenX + radius > 0 && screenX - radius < canvas.width && screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath(); ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                ctx.fillStyle = orb.color;
                ctx.fill();
                if (orb.value >= 350) {
                    ctx.shadowBlur = 6 * zoom;
                    ctx.shadowColor = orb.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }
        
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            const screenX = (p.x - cameraX) * zoom;
            const screenY = (p.y - cameraY) * zoom;
            const radius = p.radius * zoom;
            if (screenX + radius > 0 && screenX - radius < canvas.width && screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath(); ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                if (p.isBot) ctx.fillStyle = '#a855f7';
                else if (p.isAdmin) ctx.fillStyle = '#fbbf24';
                else if (p.radius > myPlayer.radius) ctx.fillStyle = '#ff4444';
                else ctx.fillStyle = '#ef4444';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = `${Math.max(10, 12 * zoom)}px Arial`;
                const levelBadge = p.level ? ` [Lvl ${p.level}]` : '';
                const displayName = p.isBot ? `🤖 ${p.username}${levelBadge}` : `${p.username}${levelBadge}`;
                if (p.isAdmin) {
                    ctx.shadowBlur = 8 * zoom;
                    ctx.shadowColor = '#ffffff';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(displayName, screenX - 30 * zoom, screenY - 15 * zoom);
                    ctx.shadowBlur = 0;
                } else {
                    ctx.fillText(displayName, screenX - 30 * zoom, screenY - 15 * zoom);
                }
                if (p.isBot && p.radius > 100) {
                    ctx.fillStyle = '#ff0000';
                    ctx.font = `${12 * zoom}px Arial`;
                    ctx.fillText('⚠️ GIANT ⚠️', screenX - 30 * zoom, screenY - 25 * zoom);
                }
            }
        }
        
        const myScreenX = (myPlayer.x - cameraX) * zoom;
        const myScreenY = (myPlayer.y - cameraY) * zoom;
        const myRadius = myPlayer.radius * zoom;
        ctx.beginPath();
        ctx.arc(myScreenX, myScreenY, myRadius, 0, Math.PI * 2);
        
        if (activePowerup === 'shield' && powerupEndTime > Date.now()) {
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(myScreenX, myScreenY, myRadius + 5 * zoom, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3 * zoom;
            ctx.stroke();
        }
        
        const myColor = getCellColor(equippedSkin);
        
        if (myColor === 'rainbow') {
            const gradient = ctx.createLinearGradient(myScreenX - myRadius, myScreenY - myRadius, myScreenX + myRadius, myScreenY + myRadius);
            gradient.addColorStop(0, '#ff0000');
            gradient.addColorStop(0.2, '#ffff00');
            gradient.addColorStop(0.4, '#00ff00');
            gradient.addColorStop(0.6, '#00ffff');
            gradient.addColorStop(0.8, '#0000ff');
            gradient.addColorStop(1, '#ff00ff');
            ctx.fillStyle = gradient;
        } else if (myColor === 'cosmic') {
            const gradient = ctx.createLinearGradient(myScreenX - myRadius, myScreenY - myRadius, myScreenX + myRadius, myScreenY + myRadius);
            gradient.addColorStop(0, '#4a00e0');
            gradient.addColorStop(1, '#8e2de2');
            ctx.fillStyle = gradient;
        } else {
            ctx.fillStyle = myColor;
        }
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3 * zoom;
        ctx.stroke();
        
        frame++;
        const currentSkin = SKINS.find(s => s.id === equippedSkin);
        if (currentSkin && currentSkin.effect === 'glow') {
            ctx.shadowBlur = 15 * zoom;
            ctx.shadowColor = myColor;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        if (currentSkin && currentSkin.effect === 'fire' && frame % 8 === 0) {
            for (let i = 0; i < 5; i++) {
                addParticle(myScreenX + (Math.random() - 0.5) * myRadius, myScreenY + Math.random() * myRadius, '#ff6600');
            }
        }
        if (currentSkin && currentSkin.effect === 'snow' && frame % 12 === 0) {
            for (let i = 0; i < 3; i++) {
                addParticle(myScreenX + (Math.random() - 0.5) * myRadius, myScreenY + (Math.random() - 0.5) * myRadius, '#00ffff');
            }
        }
        if (currentSkin && currentSkin.effect === 'dark') {
            ctx.shadowBlur = 20 * zoom;
            ctx.shadowColor = '#000000';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        if (currentSkin && currentSkin.effect === 'sparkle' && frame % 10 === 0) {
            for (let i = 0; i < 3; i++) {
                addParticle(myScreenX + (Math.random() - 0.5) * myRadius * 1.5, myScreenY + (Math.random() - 0.5) * myRadius * 1.5, '#fbbf24');
            }
        }
        if (currentSkin && currentSkin.effect === 'crown') {
            ctx.fillStyle = '#ffd700';
            ctx.font = `${Math.max(12, myRadius * 0.4)}px Arial`;
            ctx.fillText('👑', myScreenX - 10 * zoom, myScreenY - myRadius * 0.8);
        }
        if (currentSkin && currentSkin.effect === 'nebula' && frame % 15 === 0) {
            for (let i = 0; i < 4; i++) {
                addParticle(myScreenX + (Math.random() - 0.5) * myRadius * 1.2, myScreenY + (Math.random() - 0.5) * myRadius * 1.2, '#a855f7');
            }
        }
        
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(12, myRadius * 0.5)}px Arial`;
        if (myPlayer.isAdmin) {
            ctx.shadowBlur = 10 * zoom;
            ctx.shadowColor = '#ffffff';
            ctx.fillText(`${myPlayer.username} [Lvl ${currentLevel}]`, myScreenX - 35 * zoom, myScreenY - 12 * zoom);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fbbf24';
            ctx.font = `${Math.max(12, 16 * zoom)}px Arial`;
            ctx.fillText('👑', myScreenX + 15 * zoom, myScreenY - 15 * zoom);
        } else {
            ctx.fillText(`${myPlayer.username} [Lvl ${currentLevel}]`, myScreenX - 35 * zoom, myScreenY - 12 * zoom);
        }
        
        if (currentLevel >= 10) {
            ctx.shadowBlur = 12 * zoom;
            ctx.shadowColor = '#fbbf24';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        if (currentLevel >= 15) {
            ctx.beginPath();
            ctx.arc(myScreenX, myScreenY, myRadius + 3 * zoom, 0, Math.PI * 2);
            ctx.strokeStyle = '#a855f7';
            ctx.lineWidth = 2 * zoom;
            ctx.stroke();
        }
        if (currentLevel >= 20) {
            ctx.beginPath();
            ctx.arc(myScreenX, myScreenY, myRadius + 6 * zoom, 0, Math.PI * 2);
            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = 2 * zoom;
            ctx.stroke();
        }
        
        drawParticles();
        
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            if (p.radius > myPlayer.radius * 2 && Math.hypot(myPlayer.x - p.x, myPlayer.y - p.y) < 400) {
                ctx.fillStyle = '#ff0000';
                ctx.font = `${18 * zoom}px Arial`;
                ctx.fillText('⚠️ GIANT NEARBY! RUN! ⚠️', myScreenX - 70 * zoom, myScreenY - 50 * zoom);
            }
        }
    }
</script>
</body>
