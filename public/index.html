<!DOCTYPE html>
<html>
<head>
    <title>RYZZ.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #joinScreen, #gameScreen {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
        }
        #joinScreen h1 {
            color: #fbbf24;
            margin-bottom: 20px;
        }
        #joinScreen input {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 250px;
            margin-bottom: 10px;
        }
        #joinScreen button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #errorMsg {
            color: #ef4444;
            margin-top: 10px;
        }
        canvas {
            border: 2px solid #1f2937;
            display: block;
            border-radius: 8px;
            cursor: crosshair;
        }
        #ui {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }
        .stats, #leaderboard {
            background: #1f2937;
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        #leaderboard {
            min-width: 180px;
        }
        #leaderboard h4 {
            margin-bottom: 5px;
            color: #fbbf24;
        }
        #chatContainer {
            margin-top: 10px;
            background: #1f2937;
            border-radius: 8px;
        }
        #chatMessages {
            height: 100px;
            overflow-y: auto;
            background: #0a0f1e;
            border-radius: 8px 8px 0 0;
            padding: 8px;
            font-size: 12px;
        }
        #chatInputArea {
            display: flex;
            padding: 8px;
            gap: 8px;
        }
        #chatInput {
            flex: 1;
            background: #111827;
            border: 1px solid #374151;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            outline: none;
        }
        #chatSend {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
        }
        .chat-admin {
            color: #fbbf24;
            font-weight: bold;
        }
        .chat-system {
            color: #ef4444;
            font-style: italic;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>👑 RYZZ.io</h1>
    <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
    <input type="password" id="passwordInput" placeholder="Admin password (if needed)" style="margin-top: 10px;">
    <br>
    <button id="joinBtn">Join Game</button>
    <div id="errorMsg"></div>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        <div id="ui">
            <div class="stats">🎯 Score: <span id="scoreValue">0</span></div>
            <div class="stats">👑 Admin: <span id="adminName"></span></div>
            <div id="leaderboard">
                <h4>🏆 LEADERBOARD</h4>
                <div id="leaderboardList"></div>
            </div>
        </div>
        <div id="chatContainer">
            <div id="chatMessages"></div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Type a message..." maxlength="100">
                <button id="chatSend">Send</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};
    let myId = null;
    let myPlayer = null;
    let orbs = [];
    let currentScore = 0;
    
    let cameraX = 0, cameraY = 0;
    let mouseX = 0, mouseY = 0;
    
    // DOM elements
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const scoreElement = document.getElementById('scoreValue');
    const leaderboardList = document.getElementById('leaderboardList');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const adminNameSpan = document.getElementById('adminName');
    
    function addChatMessage(sender, message, isAdmin = false, isSystem = false) {
        const div = document.createElement('div');
        if (isSystem) {
            div.innerHTML = `<span class="chat-system">🔔 ${message}</span>`;
        } else if (isAdmin) {
            div.innerHTML = `<span class="chat-admin">👑 ${sender}:</span> ${message}`;
        } else {
            div.innerHTML = `<span>💬 ${sender}:</span> ${message}`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        while (chatMessages.children.length > 50) {
            chatMessages.removeChild(chatMessages.firstChild);
        }
    }
    
    function sendMessage() {
        const text = chatInput.value.trim();
        if (text === '') return;
        socket.emit('chatMessage', { message: text });
        chatInput.value = '';
        chatInput.focus();
    }
    
    chatSend.onclick = sendMessage;
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    joinBtn.onclick = () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (username === '') {
            errorMsg.innerText = 'Please enter a username';
            return;
        }
        
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        socket.emit('joinGame', { username: username, password: password });
        
        // Start game loop
        function gameLoop() {
            if (myPlayer) {
                movePlayer();
                checkCollisions();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    };
    
    // Socket events
    socket.on('currentPlayers', (serverPlayers) => {
        players = serverPlayers;
        for (let id in players) {
            if (players[id].username === usernameInput.value.trim()) {
                myId = id;
                myPlayer = players[id];
                adminNameSpan.innerText = myPlayer.isAdmin ? myPlayer.username : 'None';
                if (myPlayer.isAdmin) {
                    addChatMessage('System', 'You are ADMIN!', false, true);
                }
            }
        }
    });
    
    socket.on('currentOrbs', (serverOrbs) => {
        orbs = serverOrbs;
        console.log(`Received ${orbs.length} orbs from server`);
    });
    
    socket.on('newPlayer', (playerData) => {
        players[playerData.id] = playerData;
        addChatMessage('System', `${playerData.username} joined!`, false, true);
    });
    
    socket.on('playerMoved', (playerData) => {
        if (players[playerData.id]) {
            players[playerData.id].x = playerData.x;
            players[playerData.id].y = playerData.y;
        }
    });
    
    socket.on('playerDisconnected', (playerId) => {
        if (players[playerId]) {
            addChatMessage('System', `${players[playerId].username} left`, false, true);
            delete players[playerId];
        }
    });
    
    socket.on('leaderboardUpdate', (leaderboard) => {
        let html = '<h4>🏆 LEADERBOARD</h4>';
        for (let i = 0; i < leaderboard.length; i++) {
            const p = leaderboard[i];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
            html += `<div>${medal} ${p.username} - ${p.score}</div>`;
        }
        leaderboardList.innerHTML = html;
    });
    
    socket.on('scoreUpdate', (data) => {
        if (players[data.id]) {
            players[data.id].score = data.score;
            players[data.id].radius = data.radius;
        }
        if (data.id === myId) {
            currentScore = data.score;
            scoreElement.innerText = currentScore;
            if (myPlayer) myPlayer.radius = data.radius;
        }
    });
    
    socket.on('orbCollected', (orbId) => {
        const index = orbs.findIndex(o => o.id === orbId);
        if (index !== -1) {
            orbs.splice(index, 1);
        }
    });
    
    socket.on('chatMessage', (data) => {
        addChatMessage(data.username, data.message, data.isAdmin);
    });
    
    socket.on('adminConfirm', (isAdmin) => {
        if (isAdmin && myPlayer) {
            myPlayer.isAdmin = true;
            adminNameSpan.innerText = myPlayer.username;
            addChatMessage('System', 'You are ADMIN!', false, true);
        }
    });
    
    socket.on('nameRejected', (msg) => {
        alert(msg);
        window.location.reload();
    });
    
    // Mouse tracking
    canvas.addEventListener('mousemove', (e) => {
        if (!myPlayer) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        mouseX = canvasX + cameraX;
        mouseY = canvasY + cameraY;
        mouseX = Math.min(Math.max(mouseX, 0), 2000);
        mouseY = Math.min(Math.max(mouseY, 0), 2000);
    });
    
    function movePlayer() {
        if (!myPlayer) return;
        const dx = mouseX - myPlayer.x;
        const dy = mouseY - myPlayer.y;
        const distance = Math.hypot(dx, dy);
        if (distance > 1) {
            const speed = Math.min(5, 150 / myPlayer.radius);
            myPlayer.x += (dx / distance) * speed;
            myPlayer.y += (dy / distance) * speed;
        }
        myPlayer.x = Math.min(Math.max(myPlayer.x, myPlayer.radius + 5), 2000 - myPlayer.radius - 5);
        myPlayer.y = Math.min(Math.max(myPlayer.y, myPlayer.radius + 5), 2000 - myPlayer.radius - 5);
        socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
    }
    
    function checkCollisions() {
        if (!myPlayer) return;
        
        // Check orb collisions
        for (let i = 0; i < orbs.length; i++) {
            const orb = orbs[i];
            const dist = Math.hypot(myPlayer.x - orb.x, myPlayer.y - orb.y);
            if (dist < myPlayer.radius + orb.radius) {
                console.log('Collision detected! Sending collectOrb');
                socket.emit('collectOrb', orb.id);
                break;
            }
        }
    }
    
    function updateCamera() {
        if (!myPlayer) return;
        cameraX = myPlayer.x - canvas.width / 2;
        cameraY = myPlayer.y - canvas.height / 2;
        cameraX = Math.min(Math.max(cameraX, 0), 2000 - canvas.width);
        cameraY = Math.min(Math.max(cameraY, 0), 2000 - canvas.height);
    }
    
    function draw() {
        if (!myPlayer) return;
        updateCamera();
        
        // Background
        ctx.fillStyle = '#0a0f1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw orbs
        for (const orb of orbs) {
            const screenX = orb.x - cameraX;
            const screenY = orb.y - cameraY;
            if (screenX + orb.radius > 0 && screenX - orb.radius < canvas.width &&
                screenY + orb.radius > 0 && screenY - orb.radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, orb.radius, 0, Math.PI * 2);
                ctx.fillStyle = orb.color;
                ctx.fill();
            }
        }
        
        // Draw other players
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            const screenX = p.x - cameraX;
            const screenY = p.y - cameraY;
            if (screenX + p.radius > 0 && screenX - p.radius < canvas.width &&
                screenY + p.radius > 0 && screenY - p.radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.isAdmin ? '#fbbf24' : '#ef4444';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.fillText(p.username, screenX - 20, screenY - 15);
                if (p.isAdmin) {
                    ctx.fillStyle = '#fbbf24';
                    ctx.fillText('👑', screenX + 10, screenY - 15);
                }
            }
        }
        
        // Draw my player
        const myScreenX = myPlayer.x - cameraX;
        const myScreenY = myPlayer.y - cameraY;
        ctx.beginPath();
        ctx.arc(myScreenX, myScreenY, myPlayer.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(12, myPlayer.radius * 0.5)}px Arial`;
        ctx.fillText(myPlayer.username, myScreenX - 15, myScreenY - 12);
        if (myPlayer.isAdmin) {
            ctx.fillStyle = '#fbbf24';
            ctx.font = '16px Arial';
            ctx.fillText('👑', myScreenX + 5, myScreenY - 15);
        }
    }
</script>
</body>
</html>
