<!DOCTYPE html>
<html>
<head>
    <title>RYZZ.io - Mobile Friendly</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #joinScreen, #gameScreen {
            background: #111827;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        #joinScreen h1 {
            color: #fbbf24;
            margin-bottom: 20px;
            font-size: 24px;
        }
        #joinScreen input {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 10px;
        }
        #joinScreen button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        #errorMsg {
            color: #ef4444;
            margin-top: 10px;
        }
        #gameContainer {
            position: relative;
            display: inline-block;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        /* Mobile UI - Smaller and repositioned */
        #ui {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            display: flex;
            justify-content: space-between;
            gap: 5px;
            flex-wrap: wrap;
            z-index: 10;
            pointer-events: none;
            font-size: 10px;
        }
        .stats, #leaderboard, #zoomControl {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 4px 8px;
            border-radius: 6px;
            color: white;
            font-size: 10px;
            border: 1px solid #374151;
        }
        .stats span {
            color: #fbbf24;
        }
        #leaderboard {
            min-width: 140px;
        }
        #leaderboard h4 {
            font-size: 10px;
        }
        #leaderboardList {
            font-size: 9px;
        }
        #zoomControl button {
            padding: 2px 6px;
            font-size: 10px;
        }
        #sizeBarContainer {
            width: 50px;
            height: 4px;
        }
        /* Mobile Chat - Bottom */
        #chatOverlay {
            position: absolute;
            bottom: 5px;
            left: 5px;
            right: 5px;
            width: auto;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #374151;
            z-index: 10;
        }
        #chatMessages {
            height: 80px;
            overflow-y: auto;
            padding: 5px;
            font-size: 10px;
        }
        #chatInputArea {
            display: flex;
            padding: 5px;
            gap: 5px;
        }
        #chatInput {
            padding: 6px 8px;
            font-size: 12px;
        }
        #chatSend {
            padding: 6px 12px;
            font-size: 12px;
        }
        /* Mobile Joystick */
        #joystickContainer {
            position: absolute;
            bottom: 80px;
            left: 20px;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 20;
            touch-action: none;
        }
        #joystickBase {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(59,130,246,0.8);
            transform: translate(-50%, -50%);
            transition: transform 0.05s linear;
            border: 2px solid white;
        }
        .controls-hint {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.5);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 8px;
            color: #888;
            pointer-events: none;
            z-index: 10;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 768px) {
            .stats, #leaderboard, #zoomControl {
                font-size: 8px;
                padding: 3px 5px;
            }
            #leaderboard {
                min-width: 100px;
            }
            .stats span {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>👑 RYZZ.io</h1>
    <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
    <input type="password" id="passwordInput" placeholder="Admin password" style="margin-top: 10px;">
    <br>
    <button id="joinBtn">Join Game</button>
    <div id="errorMsg"></div>
    <p style="color:#666; margin-top:15px; font-size:12px;">Mobile: Touch and drag anywhere to move</p>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div class="stats">🎯 <span id="scoreValue">0</span></div>
            <div class="stats">📏 <span id="sizeValue">20</span>
                <div id="sizeBarContainer"><div id="sizeBar"></div></div>
            </div>
            <div class="stats">Lvl <span id="levelValue">1</span></div>
            <div class="stats">⚡ <span id="perksValue">0%</span></div>
            <div id="zoomControl">
                <button id="zoomOutBtn">-</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomInBtn">+</button>
            </div>
            <div id="leaderboard">
                <h4>🏆 TOP</h4>
                <div id="leaderboardList"></div>
            </div>
        </div>
        
        <div id="chatOverlay">
            <div id="chatMessages">
                <div class="chat-system">🔔 Touch anywhere to move!</div>
            </div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Message..." maxlength="100" autocomplete="off">
                <button id="chatSend">Send</button>
            </div>
        </div>
        
        <!-- Mobile Joystick (hidden on desktop, shown on touch) -->
        <div id="joystickContainer" class="hidden">
            <div id="joystickBase"></div>
        </div>
        
        <div class="controls-hint">👆 Touch to move | 🔍 Pinch to zoom</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({
        reconnection: true,
        reconnectionAttempts: 5,
        reconnectionDelay: 1000
    });
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Detect mobile
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    let players = {};
    let myId = null;
    let myPlayer = null;
    let orbs = [];
    let currentScore = 0;
    let currentSize = 20;
    let currentLevel = 1;
    let currentPerks = { speedMultiplier: 1, sizeMultiplier: 1, scoreMultiplier: 1, eatRangeMultiplier: 1 };
    
    let cameraX = 0, cameraY = 0;
    
    // Movement
    let targetX = null, targetY = null;
    let joystickActive = false;
    let joystickX = 0, joystickY = 0;
    
    let zoom = 1.0;
    const MIN_ZOOM = 0.3;
    const MAX_ZOOM = 2.0;
    
    let MAP_WIDTH = 4000;
    let MAP_HEIGHT = 4000;
    
    let collectingOrbIds = new Set();
    let lastLevel = 1;
    
    // DOM elements
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const scoreElement = document.getElementById('scoreValue');
    const sizeElement = document.getElementById('sizeValue');
    const sizeBar = document.getElementById('sizeBar');
    const levelElement = document.getElementById('levelValue');
    const perksElement = document.getElementById('perksValue');
    const leaderboardList = document.getElementById('leaderboardList');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const adminNameSpan = document.getElementById('adminName');
    const zoomLevelSpan = document.getElementById('zoomLevel');
    const joystickContainer = document.getElementById('joystickContainer');
    const joystickBase = document.getElementById('joystickBase');
    
    function formatScore(score) {
        if (score >= 1_000_000_000) return (score / 1_000_000_000).toFixed(1) + 'B';
        if (score >= 1_000_000) return (score / 1_000_000).toFixed(1) + 'M';
        if (score >= 1_000) return (score / 1_000).toFixed(1) + 'K';
        return score.toString();
    }
    
    function formatPerks(perks) {
        if (!perks) return '0%';
        const speed = Math.round((perks.speedMultiplier - 1) * 100);
        const size = Math.round((perks.sizeMultiplier - 1) * 100);
        const score = Math.round((perks.scoreMultiplier - 1) * 100);
        const range = Math.round((perks.eatRangeMultiplier - 1) * 100);
        
        if (speed === 0 && size === 0 && score === 0 && range === 0) return '0%';
        return `${speed+size+score+range}%`;
    }
    
    function getCellColor(level) {
        if (level >= 20) return 'rainbow';
        if (level >= 15) return '#a855f7';
        if (level >= 10) return '#f97316';
        if (level >= 7) return '#fbbf24';
        if (level >= 4) return '#60a5fa';
        return '#3b82f6';
    }
    
    function updateCanvasSize() {
        const container = document.getElementById('gameContainer');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    
    window.addEventListener('resize', () => {
        updateCanvasSize();
        if (myPlayer) updateCamera();
    });
    
    function updateSizeDisplay(radius) {
        currentSize = Math.floor(radius);
        sizeElement.innerText = currentSize;
        const percent = Math.min(100, (radius / 120) * 100);
        sizeBar.style.width = `${percent}%`;
    }
    
    function updateZoomDisplay() {
        zoomLevelSpan.innerText = `${Math.round(zoom * 100)}%`;
    }
    
    function setZoom(newZoom) {
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
        updateZoomDisplay();
        if (myPlayer) updateCamera();
    }
    
    document.getElementById('zoomInBtn').onclick = () => setZoom(zoom + 0.1);
    document.getElementById('zoomOutBtn').onclick = () => setZoom(zoom - 0.1);
    
    // Pinch zoom for mobile
    let initialPinchDistance = 0;
    let initialZoom = 1;
    
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            initialPinchDistance = Math.hypot(dx, dy);
            initialZoom = zoom;
        }
    });
    
    canvas.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const distance = Math.hypot(dx, dy);
            if (initialPinchDistance > 0) {
                const scale = distance / initialPinchDistance;
                setZoom(initialZoom * scale);
            }
        }
    });
    
    // Touch movement for mobile
    function handleTouchMove(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const canvasX = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const canvasY = (touch.clientY - rect.top) * (canvas.height / rect.height);
        
        targetX = (canvasX / zoom) + cameraX;
        targetY = (canvasY / zoom) + cameraY;
        targetX = Math.min(Math.max(targetX, 0), MAP_WIDTH);
        targetY = Math.min(Math.max(targetY, 0), MAP_HEIGHT);
        
        // Show joystick feedback
        if (joystickContainer) {
            joystickContainer.classList.remove('hidden');
            setTimeout(() => joystickContainer.classList.add('hidden'), 200);
        }
    }
    
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            handleTouchMove(e);
        }
    });
    
    // Mouse movement for desktop
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const canvasX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const canvasY = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        targetX = (canvasX / zoom) + cameraX;
        targetY = (canvasY / zoom) + cameraY;
        targetX = Math.min(Math.max(targetX, 0), MAP_WIDTH);
        targetY = Math.min(Math.max(targetY, 0), MAP_HEIGHT);
    });
    
    function addChatMessage(sender, message, isAdmin = false, isSystem = false) {
        const div = document.createElement('div');
        if (isSystem) {
            div.innerHTML = `<span class="chat-system">🔔 ${message}</span>`;
        } else if (isAdmin) {
            div.innerHTML = `<span class="chat-admin">👑 ${sender}:</span> ${message}`;
        } else {
            div.innerHTML = `<span>💬 ${sender}:</span> ${message}`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        while (chatMessages.children.length > 50) {
            chatMessages.removeChild(chatMessages.firstChild);
        }
    }
    
    function sendMessage() {
        const text = chatInput.value.trim();
        if (text === '') return;
        socket.emit('chatMessage', { message: text });
        chatInput.value = '';
        chatInput.focus();
    }
    
    chatSend.onclick = sendMessage;
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    joinBtn.onclick = () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (username === '') {
            errorMsg.innerText = 'Please enter a username';
            return;
        }
        
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        updateCanvasSize();
        
        socket.emit('joinGame', { username: username, password: password });
        
        function gameLoop() {
            if (myPlayer) {
                movePlayer();
                checkCollisions();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    };
    
    // Socket events (same as before)
    socket.on('currentPlayers', (serverPlayers) => {
        players = serverPlayers;
        for (let id in players) {
            if (players[id].username === usernameInput.value.trim()) {
                myId = id;
                myPlayer = players[id];
                updateSizeDisplay(myPlayer.radius);
                currentLevel = myPlayer.level || 1;
                currentPerks = myPlayer.perks || { speedMultiplier: 1, sizeMultiplier: 1, scoreMultiplier: 1, eatRangeMultiplier: 1 };
                levelElement.innerText = currentLevel;
                perksElement.innerHTML = formatPerks(currentPerks);
                if (myPlayer.isAdmin) {
                    addChatMessage('System', 'You are ADMIN! Type /help', false, true);
                }
            }
        }
    });
    
    socket.on('currentBots', (serverBots) => {
        for (const id in serverBots) {
            players[id] = { ...serverBots[id], isBot: true };
        }
    });
    
    socket.on('updateBots', (serverBots) => {
        for (const id in players) {
            if (players[id].isBot && !serverBots[id]) {
                delete players[id];
            }
        }
        for (const id in serverBots) {
            players[id] = { ...serverBots[id], isBot: true };
        }
    });
    
    socket.on('currentOrbs', (serverOrbs) => {
        orbs = serverOrbs;
        collectingOrbIds.clear();
    });
    
    socket.on('mapSizeUpdate', (data) => {
        MAP_WIDTH = data.width;
        MAP_HEIGHT = data.height;
    });
    
    socket.on('newPlayer', (playerData) => {
        players[playerData.id] = playerData;
        addChatMessage('System', `${playerData.username} joined!`, false, true);
    });
    
    socket.on('playerMoved', (playerData) => {
        if (players[playerData.id]) {
            players[playerData.id].x = playerData.x;
            players[playerData.id].y = playerData.y;
        }
    });
    
    socket.on('playerDisconnected', (playerId) => {
        if (players[playerId]) {
            addChatMessage('System', `${players[playerId].username} left`, false, true);
            delete players[playerId];
        }
    });
    
    socket.on('leaderboardUpdate', (leaderboard) => {
        let html = '';
        for (let i = 0; i < leaderboard.length; i++) {
            const p = leaderboard[i];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
            html += `<div>${medal} ${p.username} - ${formatScore(p.score)}</div>`;
        }
        leaderboardList.innerHTML = html;
    });
    
    socket.on('scoreUpdate', (data) => {
        if (players[data.id]) {
            players[data.id].score = data.score;
            players[data.id].radius = data.radius;
            players[data.id].level = data.level;
            players[data.id].perks = data.perks;
        }
        if (data.id === myId) {
            if (data.score > currentScore) {
                currentScore = data.score;
                scoreElement.innerText = formatScore(currentScore);
            }
            if (myPlayer) {
                myPlayer.radius = data.radius;
                updateSizeDisplay(data.radius);
            }
            if (data.level !== lastLevel) {
                lastLevel = data.level;
                currentLevel = data.level;
                currentPerks = data.perks;
                levelElement.innerText = data.level;
                perksElement.innerHTML = formatPerks(data.perks);
                addChatMessage('System', `🎉 Level ${data.level}! ${data.title}`, false, true);
            } else if (data.perks) {
                currentPerks = data.perks;
                perksElement.innerHTML = formatPerks(data.perks);
            }
        }
    });
    
    socket.on('orbCollected', (orbId) => {
        collectingOrbIds.delete(orbId);
        const index = orbs.findIndex(o => o.id === orbId);
        if (index !== -1) {
            orbs.splice(index, 1);
        }
    });
    
    socket.on('orbCollectionFailed', (orbId) => {
        collectingOrbIds.delete(orbId);
    });
    
    socket.on('chatMessage', (data) => {
        addChatMessage(data.username, data.message, data.isAdmin);
    });
    
    socket.on('adminConfirm', (isAdmin) => {
        if (isAdmin && myPlayer) {
            myPlayer.isAdmin = true;
            addChatMessage('System', 'You are ADMIN! Type /help', false, true);
        }
    });
    
    socket.on('nameRejected', (msg) => {
        alert(msg);
        window.location.reload();
    });
    
    socket.on('kicked', (msg) => {
        alert(msg);
        window.location.reload();
    });
    
    function movePlayer() {
        if (!myPlayer) return;
        
        if (targetX !== null && targetY !== null) {
            const dx = targetX - myPlayer.x;
            const dy = targetY - myPlayer.y;
            const distance = Math.hypot(dx, dy);
            if (distance > 1) {
                const baseSpeed = Math.min(6, 150 / myPlayer.radius);
                const speedMultiplier = currentPerks?.speedMultiplier || 1;
                const speed = baseSpeed * speedMultiplier;
                myPlayer.x += (dx / distance) * speed;
                myPlayer.y += (dy / distance) * speed;
            } else {
                myPlayer.x = targetX;
                myPlayer.y = targetY;
            }
        }
        
        myPlayer.x = Math.min(Math.max(myPlayer.x, myPlayer.radius + 5), MAP_WIDTH - myPlayer.radius - 5);
        myPlayer.y = Math.min(Math.max(myPlayer.y, myPlayer.radius + 5), MAP_HEIGHT - myPlayer.radius - 5);
        socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
    }
    
    function checkCollisions() {
        if (!myPlayer) return;
        
        const eatRangeBonus = currentPerks?.eatRangeMultiplier || 1;
        
        for (let i = 0; i < orbs.length; i++) {
            const orb = orbs[i];
            if (collectingOrbIds.has(orb.id)) continue;
            
            const dist = Math.hypot(myPlayer.x - orb.x, myPlayer.y - orb.y);
            if (dist < myPlayer.radius + orb.radius * eatRangeBonus) {
                collectingOrbIds.add(orb.id);
                socket.emit('collectOrb', orb.id);
                orbs.splice(i, 1);
                currentScore += orb.value;
                scoreElement.innerText = formatScore(currentScore);
                if (myPlayer) myPlayer.score = currentScore;
                break;
            }
        }
    }
    
    function updateCamera() {
        if (!myPlayer) return;
        const effectiveWidth = canvas.width / zoom;
        const effectiveHeight = canvas.height / zoom;
        cameraX = myPlayer.x - effectiveWidth / 2;
        cameraY = myPlayer.y - effectiveHeight / 2;
        cameraX = Math.min(Math.max(cameraX, 0), MAP_WIDTH - effectiveWidth);
        cameraY = Math.min(Math.max(cameraY, 0), MAP_HEIGHT - effectiveHeight);
    }
    
    function draw() {
        if (!myPlayer) return;
        updateCamera();
        
        ctx.fillStyle = '#0a0f1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw orbs
        for (const orb of orbs) {
            const screenX = (orb.x - cameraX) * zoom;
            const screenY = (orb.y - cameraY) * zoom;
            const radius = Math.max(3, orb.radius * zoom);
            if (screenX + radius > 0 && screenX - radius < canvas.width &&
                screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                ctx.fillStyle = orb.color;
                ctx.fill();
            }
        }
        
        // Draw players
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            const screenX = (p.x - cameraX) * zoom;
            const screenY = (p.y - cameraY) * zoom;
            const radius = Math.max(3, p.radius * zoom);
            if (screenX + radius > 0 && screenX - radius < canvas.width &&
                screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                if (p.isBot) ctx.fillStyle = '#a855f7';
                else if (p.isAdmin) ctx.fillStyle = '#fbbf24';
                else if (p.radius > myPlayer.radius) ctx.fillStyle = '#ff4444';
                else ctx.fillStyle = '#ef4444';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = `${Math.max(8, 10 * zoom)}px Arial`;
                const displayName = p.isBot ? `🤖 ${p.username}` : p.username;
                ctx.fillText(displayName, screenX - 25 * zoom, screenY - 12 * zoom);
            }
        }
        
        // Draw my player
        const myScreenX = (myPlayer.x - cameraX) * zoom;
        const myScreenY = (myPlayer.y - cameraY) * zoom;
        const myRadius = Math.max(3, myPlayer.radius * zoom);
        ctx.beginPath();
        ctx.arc(myScreenX, myScreenY, myRadius, 0, Math.PI * 2);
        
        const myColor = getCellColor(currentLevel);
        if (myColor === 'rainbow') {
            const gradient = ctx.createLinearGradient(myScreenX - myRadius, myScreenY - myRadius, myScreenX + myRadius, myScreenY + myRadius);
            gradient.addColorStop(0, '#ff0000');
            gradient.addColorStop(0.2, '#ffff00');
            gradient.addColorStop(0.4, '#00ff00');
            gradient.addColorStop(0.6, '#00ffff');
            gradient.addColorStop(0.8, '#0000ff');
            gradient.addColorStop(1, '#ff00ff');
            ctx.fillStyle = gradient;
        } else {
            ctx.fillStyle = myColor;
        }
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = Math.max(1, 2 * zoom);
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(10, myRadius * 0.4)}px Arial`;
        ctx.fillText(myPlayer.username, myScreenX - 25 * zoom, myScreenY - 10 * zoom);
    }
</script>
</body>
