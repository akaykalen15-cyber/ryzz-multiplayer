<!DOCTYPE html>
<html>
<head>
    <title>RYZZ.io - Perk System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #joinScreen, #gameScreen {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
        }
        #joinScreen h1 {
            color: #fbbf24;
            margin-bottom: 20px;
        }
        #joinScreen input {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 250px;
            margin-bottom: 10px;
        }
        #joinScreen button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #errorMsg {
            color: #ef4444;
            margin-top: 10px;
        }
        #gameContainer {
            position: relative;
            display: inline-block;
        }
        canvas {
            border: 2px solid #1f2937;
            display: block;
            border-radius: 8px;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 10;
            pointer-events: none;
        }
        .stats, #leaderboard, #zoomControl {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 8px;
            color: white;
            font-size: 11px;
            border: 1px solid #374151;
        }
        .stats span {
            color: #fbbf24;
            font-weight: bold;
        }
        #leaderboard {
            min-width: 180px;
        }
        #leaderboard h4 {
            margin-bottom: 4px;
            color: #fbbf24;
            font-size: 11px;
        }
        #leaderboardList {
            max-height: 100px;
            overflow-y: auto;
            font-size: 10px;
        }
        #leaderboardList div {
            margin: 2px 0;
        }
        #zoomControl button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            pointer-events: auto;
        }
        #zoomLevel {
            font-size: 10px;
            min-width: 35px;
            text-align: center;
        }
        #sizeBarContainer {
            width: 70px;
            height: 5px;
            background: #374151;
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
            margin-left: 5px;
        }
        #sizeBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #fbbf24);
            border-radius: 3px;
            transition: width 0.1s ease;
        }
        #chatOverlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 280px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #374151;
            z-index: 10;
        }
        #chatMessages {
            height: 100px;
            overflow-y: auto;
            padding: 6px;
            font-size: 10px;
            color: #ccc;
        }
        #chatMessages div {
            margin-bottom: 3px;
            word-wrap: break-word;
        }
        #chatInputArea {
            display: flex;
            padding: 5px;
            gap: 5px;
            border-top: 1px solid #374151;
        }
        #chatInput {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 5px 8px;
            border-radius: 6px;
            outline: none;
            font-size: 10px;
        }
        #chatInput:focus {
            border-color: #fbbf24;
        }
        #chatSend {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
        }
        .chat-admin { color: #fbbf24; font-weight: bold; }
        .chat-system { color: #ef4444; font-style: italic; }
        .hidden { display: none; }
        .score-pop {
            position: fixed;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.5s ease-out forwards;
            z-index: 200;
            font-size: 16px;
            text-shadow: 0 0 3px black;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
        .controls-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 9px;
            color: #888;
            pointer-events: none;
        }
        .level-up {
            animation: levelFlash 0.5s ease-out;
        }
        @keyframes levelFlash {
            0% { text-shadow: 0 0 0px #fbbf24; }
            50% { text-shadow: 0 0 20px #fbbf24; }
            100% { text-shadow: 0 0 0px #fbbf24; }
        }
        .perk-badge {
            display: inline-block;
            background: rgba(59,130,246,0.3);
            border-radius: 4px;
            padding: 0 4px;
            margin-left: 4px;
            font-size: 9px;
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>👑 RYZZ.io</h1>
    <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
    <input type="password" id="passwordInput" placeholder="Admin password" style="margin-top: 10px;">
    <br>
    <button id="joinBtn">Join Game</button>
    <div id="errorMsg"></div>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <div id="ui">
            <div class="stats">🎯 Score: <span id="scoreValue">0</span></div>
            <div class="stats">📏 Size: <span id="sizeValue">20</span>
                <div id="sizeBarContainer"><div id="sizeBar"></div></div>
            </div>
            <div class="stats">🎯 Lvl: <span id="levelValue">1</span> <span id="levelTitle">🍼 Newbie</span></div>
            <div class="stats">⚡ Perks: <span id="perksValue">0%</span></div>
            <div class="stats">👑 Admin: <span id="adminName"></span></div>
            <div id="zoomControl">
                <span>🔍</span>
                <button id="zoomOutBtn">-</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomInBtn">+</button>
                <button id="zoomResetBtn">Reset</button>
            </div>
            <div id="leaderboard">
                <h4>🏆 LEADERBOARD</h4>
                <div id="leaderboardList"></div>
            </div>
        </div>
        
        <div id="chatOverlay">
            <div id="chatMessages">
                <div class="chat-system">🔔 Welcome! WASD or Arrow keys to move.</div>
                <div class="chat-system">🎯 Type /perks to see your level bonuses!</div>
            </div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Type a message... /help for commands" maxlength="100" autocomplete="off">
                <button id="chatSend">Send</button>
            </div>
        </div>
        <div class="controls-hint">⬆️ WASD / Arrow Keys | 🖱️ Mouse optional | 🔍 Scroll to zoom</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({
        reconnection: true,
        reconnectionAttempts: 5,
        reconnectionDelay: 1000
    });
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};
    let myId = null;
    let myPlayer = null;
    let orbs = [];
    let currentScore = 0;
    let currentSize = 20;
    let currentLevel = 1;
    let currentTitle = '🍼 Newbie';
    let currentPerks = { speedMultiplier: 1, sizeMultiplier: 1, scoreMultiplier: 1, eatRangeMultiplier: 1 };
    
    let cameraX = 0, cameraY = 0;
    
    let moveDirection = { x: 0, y: 0 };
    let mouseX = null, mouseY = null;
    let useMouse = true;
    
    let zoom = 1.0;
    const MIN_ZOOM = 0.05;
    const MAX_ZOOM = 3.0;
    
    let MAP_WIDTH = 4000;
    let MAP_HEIGHT = 4000;
    
    let collectingOrbIds = new Set();
    let lastLevel = 1;
    
    // DOM elements
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const scoreElement = document.getElementById('scoreValue');
    const sizeElement = document.getElementById('sizeValue');
    const sizeBar = document.getElementById('sizeBar');
    const levelElement = document.getElementById('levelValue');
    const levelTitleElement = document.getElementById('levelTitle');
    const perksElement = document.getElementById('perksValue');
    const leaderboardList = document.getElementById('leaderboardList');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const adminNameSpan = document.getElementById('adminName');
    const zoomLevelSpan = document.getElementById('zoomLevel');
    
    function formatScore(score) {
        if (score >= 1_000_000_000) return (score / 1_000_000_000).toFixed(1) + 'B';
        if (score >= 1_000_000) return (score / 1_000_000).toFixed(1) + 'M';
        if (score >= 1_000) return (score / 1_000).toFixed(1) + 'K';
        return score.toString();
    }
    
    function formatPerks(perks) {
        if (!perks) return '0%';
        const speed = Math.round((perks.speedMultiplier - 1) * 100);
        const size = Math.round((perks.sizeMultiplier - 1) * 100);
        const score = Math.round((perks.scoreMultiplier - 1) * 100);
        const range = Math.round((perks.eatRangeMultiplier - 1) * 100);
        
        if (speed === 0 && size === 0 && score === 0 && range === 0) return '0%';
        
        let parts = [];
        if (speed > 0) parts.push(`⚡+${speed}%`);
        if (size > 0) parts.push(`💪+${size}%`);
        if (score > 0) parts.push(`💰+${score}%`);
        if (range > 0) parts.push(`🎯+${range}%`);
        
        return parts.join(' ');
    }
    
    function getCellColor(level) {
        if (level >= 20) return 'rainbow';
        if (level >= 15) return '#a855f7';
        if (level >= 10) return '#f97316';
        if (level >= 7) return '#fbbf24';
        if (level >= 4) return '#60a5fa';
        return '#3b82f6';
    }
    
    function updateSizeDisplay(radius) {
        currentSize = Math.floor(radius);
        sizeElement.innerText = currentSize;
        const percent = Math.min(100, (radius / 120) * 100);
        sizeBar.style.width = `${percent}%`;
    }
    
    function updateZoomDisplay() {
        zoomLevelSpan.innerText = `${Math.round(zoom * 100)}%`;
    }
    
    function setZoom(newZoom) {
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
        updateZoomDisplay();
    }
    
    document.getElementById('zoomInBtn').onclick = () => setZoom(zoom + 0.1);
    document.getElementById('zoomOutBtn').onclick = () => setZoom(zoom - 0.1);
    document.getElementById('zoomResetBtn').onclick = () => setZoom(1.0);
    
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        setZoom(e.deltaY < 0 ? zoom + 0.1 : zoom - 0.1);
    });
    
    const keys = {
        ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
        w: false, s: false, a: false, d: false
    };
    
    window.addEventListener('keydown', (e) => {
        const key = e.key;
        if (keys.hasOwnProperty(key)) {
            keys[key] = true;
            useMouse = false;
            e.preventDefault();
        }
        if (key === 'w') keys.w = true;
        if (key === 'a') keys.a = true;
        if (key === 's') keys.s = true;
        if (key === 'd') keys.d = true;
    });
    
    window.addEventListener('keyup', (e) => {
        const key = e.key;
        if (keys.hasOwnProperty(key)) {
            keys[key] = false;
        }
        if (key === 'w') keys.w = false;
        if (key === 'a') keys.a = false;
        if (key === 's') keys.s = false;
        if (key === 'd') keys.d = false;
    });
    
    canvas.addEventListener('mousemove', (e) => {
        useMouse = true;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        
        mouseX = (canvasX / zoom) + cameraX;
        mouseY = (canvasY / zoom) + cameraY;
        mouseX = Math.min(Math.max(mouseX, 0), MAP_WIDTH);
        mouseY = Math.min(Math.max(mouseY, 0), MAP_HEIGHT);
    });
    
    function getMoveVector() {
        let moveX = 0, moveY = 0;
        if (keys.ArrowUp || keys.w) moveY -= 1;
        if (keys.ArrowDown || keys.s) moveY += 1;
        if (keys.ArrowLeft || keys.a) moveX -= 1;
        if (keys.ArrowRight || keys.d) moveX += 1;
        if (moveX !== 0 || moveY !== 0) {
            const len = Math.hypot(moveX, moveY);
            moveX /= len;
            moveY /= len;
        }
        return { x: moveX, y: moveY };
    }
    
    function addChatMessage(sender, message, isAdmin = false, isSystem = false) {
        const div = document.createElement('div');
        if (isSystem) {
            div.innerHTML = `<span class="chat-system">🔔 ${message}</span>`;
        } else if (isAdmin) {
            div.innerHTML = `<span class="chat-admin">👑 ${sender}:</span> ${message}`;
        } else {
            div.innerHTML = `<span>💬 ${sender}:</span> ${message}`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        while (chatMessages.children.length > 50) {
            chatMessages.removeChild(chatMessages.firstChild);
        }
    }
    
    function sendMessage() {
        const text = chatInput.value.trim();
        if (text === '') return;
        socket.emit('chatMessage', { message: text });
        chatInput.value = '';
        chatInput.focus();
    }
    
    chatSend.onclick = sendMessage;
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    joinBtn.onclick = () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (username === '') {
            errorMsg.innerText = 'Please enter a username';
            return;
        }
        
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        socket.emit('joinGame', { username: username, password: password });
        
        function gameLoop() {
            if (myPlayer) {
                movePlayer();
                checkCollisions();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    };
    
    // Socket events
    socket.on('currentPlayers', (serverPlayers) => {
        players = serverPlayers;
        for (let id in players) {
            if (players[id].username === usernameInput.value.trim()) {
                myId = id;
                myPlayer = players[id];
                adminNameSpan.innerText = myPlayer.isAdmin ? myPlayer.username : 'None';
                updateSizeDisplay(myPlayer.radius);
                currentLevel = myPlayer.level || 1;
                currentTitle = myPlayer.title || '🍼 Newbie';
                currentPerks = myPlayer.perks || { speedMultiplier: 1, sizeMultiplier: 1, scoreMultiplier: 1, eatRangeMultiplier: 1 };
                levelElement.innerText = currentLevel;
                levelTitleElement.innerText = currentTitle;
                perksElement.innerHTML = formatPerks(currentPerks);
                if (myPlayer.isAdmin) {
                    addChatMessage('System', 'You are ADMIN! Type /help', false, true);
                }
            }
        }
    });
    
    socket.on('currentBots', (serverBots) => {
        for (const id in serverBots) {
            players[id] = { ...serverBots[id], isBot: true };
        }
    });
    
    socket.on('updateBots', (serverBots) => {
        for (const id in players) {
            if (players[id].isBot && !serverBots[id]) {
                delete players[id];
            }
        }
        for (const id in serverBots) {
            players[id] = { ...serverBots[id], isBot: true };
        }
    });
    
    socket.on('currentOrbs', (serverOrbs) => {
        orbs = serverOrbs;
        collectingOrbIds.clear();
    });
    
    socket.on('mapSizeUpdate', (data) => {
        MAP_WIDTH = data.width;
        MAP_HEIGHT = data.height;
    });
    
    socket.on('newPlayer', (playerData) => {
        players[playerData.id] = playerData;
        addChatMessage('System', `${playerData.username} joined!`, false, true);
    });
    
    socket.on('playerMoved', (playerData) => {
        if (players[playerData.id]) {
            players[playerData.id].x = playerData.x;
            players[playerData.id].y = playerData.y;
        }
    });
    
    socket.on('playerDisconnected', (playerId) => {
        if (players[playerId]) {
            addChatMessage('System', `${players[playerId].username} left`, false, true);
            delete players[playerId];
        }
    });
    
    socket.on('leaderboardUpdate', (leaderboard) => {
        let html = '';
        for (let i = 0; i < leaderboard.length; i++) {
            const p = leaderboard[i];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
            html += `<div>${medal} ${p.username} - ${formatScore(p.score)} (Lvl ${p.level})</div>`;
        }
        leaderboardList.innerHTML = html;
    });
    
    socket.on('scoreUpdate', (data) => {
        if (players[data.id]) {
            players[data.id].score = data.score;
            players[data.id].radius = data.radius;
            players[data.id].level = data.level;
            players[data.id].title = data.title;
            players[data.id].perks = data.perks;
        }
        if (data.id === myId) {
            if (data.score > currentScore) {
                currentScore = data.score;
                scoreElement.innerText = formatScore(currentScore);
            }
            if (myPlayer) {
                myPlayer.radius = data.radius;
                updateSizeDisplay(data.radius);
            }
            if (data.level !== lastLevel) {
                lastLevel = data.level;
                currentLevel = data.level;
                currentTitle = data.title;
                currentPerks = data.perks;
                levelElement.innerText = data.level;
                levelTitleElement.innerText = data.title;
                perksElement.innerHTML = formatPerks(data.perks);
                levelElement.classList.add('level-up');
                levelTitleElement.classList.add('level-up');
                setTimeout(() => {
                    levelElement.classList.remove('level-up');
                    levelTitleElement.classList.remove('level-up');
                }, 500);
                addChatMessage('System', `🎉 LEVEL UP! You reached ${data.title} (Level ${data.level})! ${formatPerks(data.perks)}`, false, true);
            } else if (data.perks) {
                currentPerks = data.perks;
                perksElement.innerHTML = formatPerks(data.perks);
            }
        }
    });
    
    socket.on('orbCollected', (orbId) => {
        collectingOrbIds.delete(orbId);
        const index = orbs.findIndex(o => o.id === orbId);
        if (index !== -1) {
            orbs.splice(index, 1);
        }
    });
    
    socket.on('orbCollectionFailed', (orbId) => {
        collectingOrbIds.delete(orbId);
    });
    
    socket.on('chatMessage', (data) => {
        addChatMessage(data.username, data.message, data.isAdmin);
    });
    
    socket.on('adminConfirm', (isAdmin) => {
        if (isAdmin && myPlayer) {
            myPlayer.isAdmin = true;
            adminNameSpan.innerText = myPlayer.username;
            addChatMessage('System', 'You are ADMIN! Type /help', false, true);
        }
    });
    
    socket.on('nameRejected', (msg) => {
        alert(msg);
        window.location.reload();
    });
    
    socket.on('kicked', (msg) => {
        alert(msg);
        window.location.reload();
    });
    
    function movePlayer() {
        if (!myPlayer) return;
        
        let targetX = myPlayer.x;
        let targetY = myPlayer.y;
        
        if (useMouse && mouseX !== null && mouseY !== null) {
            targetX = mouseX;
            targetY = mouseY;
        } else {
            const move = getMoveVector();
            if (move.x !== 0 || move.y !== 0) {
                const baseSpeed = Math.min(6, 150 / myPlayer.radius);
                const speedMultiplier = currentPerks?.speedMultiplier || 1;
                const speed = baseSpeed * speedMultiplier;
                targetX = myPlayer.x + move.x * speed;
                targetY = myPlayer.y + move.y * speed;
            }
        }
        
        const dx = targetX - myPlayer.x;
        const dy = targetY - myPlayer.y;
        const distance = Math.hypot(dx, dy);
        if (distance > 1) {
            const baseSpeed = Math.min(6, 150 / myPlayer.radius);
            const speedMultiplier = currentPerks?.speedMultiplier || 1;
            const speed = baseSpeed * speedMultiplier;
            myPlayer.x += (dx / distance) * speed;
            myPlayer.y += (dy / distance) * speed;
        } else if (!useMouse) {
            myPlayer.x = targetX;
            myPlayer.y = targetY;
        }
        
        myPlayer.x = Math.min(Math.max(myPlayer.x, myPlayer.radius + 5), MAP_WIDTH - myPlayer.radius - 5);
        myPlayer.y = Math.min(Math.max(myPlayer.y, myPlayer.radius + 5), MAP_HEIGHT - myPlayer.radius - 5);
        socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
    }
    
    function checkCollisions() {
        if (!myPlayer) return;
        
        const eatRangeBonus = currentPerks?.eatRangeMultiplier || 1;
        
        for (let i = 0; i < orbs.length; i++) {
            const orb = orbs[i];
            if (collectingOrbIds.has(orb.id)) continue;
            
            const dist = Math.hypot(myPlayer.x - orb.x, myPlayer.y - orb.y);
            const effectiveRadius = myPlayer.radius + orb.radius * eatRangeBonus;
            if (dist < effectiveRadius) {
                collectingOrbIds.add(orb.id);
                socket.emit('collectOrb', orb.id);
                orbs.splice(i, 1);
                const points = Math.floor(orb.value * (currentPerks?.scoreMultiplier || 1));
                currentScore += points;
                scoreElement.innerText = formatScore(currentScore);
                if (myPlayer) myPlayer.score = currentScore;
                break;
            }
        }
        
        for (const id in players) {
            if (id === myId) continue;
            const other = players[id];
            if (other.isBot) continue;
            
            const dist = Math.hypot(myPlayer.x - other.x, myPlayer.y - other.y);
            const effectiveRadius = myPlayer.radius + other.radius;
            if (dist < effectiveRadius) {
                if (myPlayer.radius > other.radius && !other.isAdmin) {
                    socket.emit('eatPlayer', id);
                    addChatMessage('System', `🍽️ You ate ${other.username}!`, false, true);
                } else if (other.radius > myPlayer.radius) {
                    socket.emit('eatPlayer', myId);
                    addChatMessage('System', `💀 You were eaten by ${other.username}!`, false, true);
                    myPlayer.x = Math.random() * (MAP_WIDTH - 400) + 200;
                    myPlayer.y = Math.random() * (MAP_HEIGHT - 400) + 200;
                    socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
                } else {
                    const angle = Math.atan2(myPlayer.y - other.y, myPlayer.x - other.x);
                    myPlayer.x += Math.cos(angle) * 20;
                    myPlayer.y += Math.sin(angle) * 20;
                }
            }
        }
    }
    
    function updateCamera() {
        if (!myPlayer) return;
        const effectiveWidth = canvas.width / zoom;
        const effectiveHeight = canvas.height / zoom;
        cameraX = myPlayer.x - effectiveWidth / 2;
        cameraY = myPlayer.y - effectiveHeight / 2;
        cameraX = Math.min(Math.max(cameraX, 0), MAP_WIDTH - effectiveWidth);
        cameraY = Math.min(Math.max(cameraY, 0), MAP_HEIGHT - effectiveHeight);
    }
    
    function draw() {
        if (!myPlayer) return;
        updateCamera();
        
        ctx.fillStyle = '#0a0f1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        let gridSize = 200;
        if (zoom < 0.3) gridSize = 500;
        if (zoom < 0.15) gridSize = 1000;
        if (zoom > 1.5) gridSize = 100;
        
        ctx.strokeStyle = '#1a2340';
        ctx.lineWidth = 1;
        const startX = Math.floor(cameraX / gridSize) * gridSize;
        const startY = Math.floor(cameraY / gridSize) * gridSize;
        for (let x = startX; x < cameraX + canvas.width / zoom; x += gridSize) {
            const screenX = (x - cameraX) * zoom;
            ctx.beginPath();
            ctx.moveTo(screenX, 0);
            ctx.lineTo(screenX, canvas.height);
            ctx.stroke();
        }
        for (let y = startY; y < cameraY + canvas.height / zoom; y += gridSize) {
            const screenY = (y - cameraY) * zoom;
            ctx.beginPath();
            ctx.moveTo(0, screenY);
            ctx.lineTo(canvas.width, screenY);
            ctx.stroke();
        }
        
        for (const orb of orbs) {
            const screenX = (orb.x - cameraX) * zoom;
            const screenY = (orb.y - cameraY) * zoom;
            const radius = orb.radius * zoom;
            if (screenX + radius > 0 && screenX - radius < canvas.width &&
                screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                ctx.fillStyle = orb.color;
                ctx.fill();
            }
        }
        
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            const screenX = (p.x - cameraX) * zoom;
            const screenY = (p.y - cameraY) * zoom;
            const radius = p.radius * zoom;
            if (screenX + radius > 0 && screenX - radius < canvas.width &&
                screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                if (p.isBot) ctx.fillStyle = '#a855f7';
                else if (p.isAdmin) ctx.fillStyle = '#fbbf24';
                else if (p.radius > myPlayer.radius) ctx.fillStyle = '#ff4444';
                else ctx.fillStyle = '#ef4444';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = `${Math.max(9, 11 * zoom)}px Arial`;
                const levelBadge = p.level ? ` [Lvl ${p.level}]` : '';
                const displayName = p.isBot ? `🤖 ${p.username}${levelBadge}` : `${p.username}${levelBadge}`;
                ctx.fillText(displayName, screenX - 30 * zoom, screenY - 15 * zoom);
            }
        }
        
        const myScreenX = (myPlayer.x - cameraX) * zoom;
        const myScreenY = (myPlayer.y - cameraY) * zoom;
        const myRadius = myPlayer.radius * zoom;
        ctx.beginPath();
        ctx.arc(myScreenX, myScreenY, myRadius, 0, Math.PI * 2);
        
        const myColor = getCellColor(currentLevel);
        if (myColor === 'rainbow') {
            const gradient = ctx.createLinearGradient(myScreenX - myRadius, myScreenY - myRadius, myScreenX + myRadius, myScreenY + myRadius);
            gradient.addColorStop(0, '#ff0000');
            gradient.addColorStop(0.2, '#ffff00');
            gradient.addColorStop(0.4, '#00ff00');
            gradient.addColorStop(0.6, '#00ffff');
            gradient.addColorStop(0.8, '#0000ff');
            gradient.addColorStop(1, '#ff00ff');
            ctx.fillStyle = gradient;
        } else {
            ctx.fillStyle = myColor;
        }
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3 * zoom;
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(11, myRadius * 0.45)}px Arial`;
        ctx.fillText(`${myPlayer.username} [Lvl ${currentLevel}]`, myScreenX - 35 * zoom, myScreenY - 12 * zoom);
        if (myPlayer.isAdmin) {
            ctx.fillStyle = '#fbbf24';
            ctx.font = `${Math.max(11, 14 * zoom)}px Arial`;
            ctx.fillText('👑', myScreenX + 15 * zoom, myScreenY - 15 * zoom);
        }
        
        if (currentLevel >= 10) {
            ctx.shadowBlur = 12 * zoom;
            ctx.shadowColor = '#fbbf24';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Draw perk indicator ring for high levels
        if (currentLevel >= 15) {
            ctx.beginPath();
            ctx.arc(myScreenX, myScreenY, myRadius + 3 * zoom, 0, Math.PI * 2);
            ctx.strokeStyle = '#a855f7';
            ctx.lineWidth = 2 * zoom;
            ctx.stroke();
        }
        if (currentLevel >= 20) {
            ctx.beginPath();
            ctx.arc(myScreenX, myScreenY, myRadius + 6 * zoom, 0, Math.PI * 2);
            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = 2 * zoom;
            ctx.stroke();
        }
    }
</script>
