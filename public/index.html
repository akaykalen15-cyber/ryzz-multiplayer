<!DOCTYPE html>
<html>
<head>
    <title>RYZZ.io - Faster Gameplay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #joinScreen, #gameScreen {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
        }
        #joinScreen h1 { color: #fbbf24; margin-bottom: 20px; }
        #joinScreen input {
            background: #1f2937; border: 1px solid #374151; color: #ffffff;
            caret-color: #fbbf24; padding: 12px 20px; border-radius: 8px;
            font-size: 16px; width: 250px; margin-bottom: 10px; outline: none;
        }
        #joinScreen input:focus { border-color: #fbbf24; }
        #joinScreen input::placeholder { color: #6b7280; }
        #joinScreen button {
            background: #3b82f6; border: none; color: white;
            padding: 12px 30px; border-radius: 8px; font-size: 16px; cursor: pointer;
        }
        #joinScreen button:hover { background: #2563eb; }
        #errorMsg { color: #ef4444; margin-top: 10px; }
        #gameContainer { position: relative; display: inline-block; }
        canvas { border: 2px solid #1f2937; display: block; border-radius: 8px; cursor: crosshair; }
        #ui {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;
            z-index: 10; pointer-events: none;
        }
        .stats, #leaderboard, #allTimeLeaderboard, #zoomControl {
            pointer-events: auto; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            padding: 6px 12px; border-radius: 8px; color: white; font-size: 12px;
            border: 1px solid #374151;
        }
        .stats span { color: #fbbf24; font-weight: bold; }
        .admin-glowing {
            font-weight: bold; color: #ffffff;
            text-shadow: 0 0 5px #ffffff, 0 0 10px #ffffff, 0 0 15px #fbbf24;
            animation: adminPulse 1.5s ease-in-out infinite;
        }
        @keyframes adminPulse {
            0% { text-shadow: 0 0 5px #ffffff, 0 0 10px #ffffff; }
            50% { text-shadow: 0 0 10px #ffffff, 0 0 20px #fbbf24, 0 0 30px #fbbf24; }
            100% { text-shadow: 0 0 5px #ffffff, 0 0 10px #ffffff; }
        }
        #leaderboard, #allTimeLeaderboard { min-width: 160px; }
        #leaderboard h4, #allTimeLeaderboard h4 { margin-bottom: 4px; color: #fbbf24; font-size: 11px; }
        #leaderboardList, #allTimeList { max-height: 100px; overflow-y: auto; font-size: 10px; }
        #leaderboardList div, #allTimeList div { margin: 2px 0; }
        #zoomControl button {
            background: #3b82f6; border: none; color: white;
            padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 12px;
            pointer-events: auto;
        }
        #zoomLevel { font-size: 11px; min-width: 45px; text-align: center; }
        #sizeBarContainer { width: 80px; height: 6px; background: #374151; border-radius: 3px; overflow: hidden; display: inline-block; margin-left: 6px; }
        #sizeBar { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #fbbf24); border-radius: 3px; transition: width 0.1s ease; }
        #chatOverlay {
            position: absolute; bottom: 10px; left: 10px; width: 280px;
            background: rgba(0,0,0,0.85); border-radius: 8px; backdrop-filter: blur(5px);
            border: 1px solid #374151; z-index: 10;
        }
        #chatMessages { height: 100px; overflow-y: auto; padding: 6px; font-size: 11px; color: #ccc; }
        #chatMessages div { margin-bottom: 3px; word-wrap: break-word; }
        #chatInputArea { display: flex; padding: 5px; gap: 5px; border-top: 1px solid #374151; }
        #chatInput { flex:1; background:#1f2937; border:1px solid #374151; color:white; padding:5px 8px; border-radius:6px; outline:none; font-size:11px; }
        #chatInput:focus { border-color: #fbbf24; }
        #chatSend { background:#3b82f6; border:none; color:white; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:11px; }
        .chat-admin { color:#fbbf24; font-weight:bold; }
        .chat-system { color:#ef4444; font-style:italic; }
        .hidden { display: none; }
        .controls-hint {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 6px;
            font-size: 10px; color: #888; pointer-events: none;
        }
        .leaderboard-admin { color:#ffffff; font-weight:bold; text-shadow:0 0 3px #ffffff,0 0 6px #fbbf24; }
        #adminPanel {
            position: absolute; top: 80px; right: 10px;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); border-radius: 12px;
            padding: 10px; border: 1px solid #fbbf24; z-index: 20; pointer-events: auto;
            min-width: 150px;
        }
        #adminPanel h4 { color: #fbbf24; font-size: 11px; margin-bottom: 8px; text-align: center; }
        .admin-btn { background:#3b82f6; border:none; color:white; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:11px; margin:3px; width:65px; }
        .admin-btn:hover { background:#2563eb; }
        .admin-btn-danger { background:#ef4444; }
        .admin-btn-danger:hover { background:#dc2626; }
        .admin-btn-gold { background:#fbbf24; color:#111827; }
        .admin-btn-gold:hover { background:#f59e0b; }
        .admin-btn-group { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
        .player-select { background:#1f2937; border:1px solid #374151; color:white; padding:4px 6px; border-radius:6px; font-size:10px; width:100%; margin-bottom:8px; }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>👑 RYZZ.io</h1>
    <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20" autocomplete="off" value="">
    <input type="password" id="passwordInput" placeholder="Admin password" style="margin-top: 10px;" autocomplete="off">
    <br>
    <button id="joinBtn">Join Game</button>
    <div id="errorMsg"></div>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <div id="adminPanel" class="hidden">
            <h4>👑 ADMIN PANEL</h4>
            <div class="admin-btn-group">
                <button class="admin-btn" data-points="100">+100</button>
                <button class="admin-btn" data-points="500">+500</button>
                <button class="admin-btn" data-points="1000">+1K</button>
                <button class="admin-btn" data-points="5000">+5K</button>
                <button class="admin-btn" data-points="10000">+10K</button>
                <button class="admin-btn admin-btn-gold" data-points="50000">+50K</button>
                <button class="admin-btn admin-btn-gold" data-points="100000">+100K</button>
            </div>
            <div class="admin-btn-group" style="margin-top: 8px;">
                <button class="admin-btn" id="adminHealBtn">💚 Heal</button>
                <button class="admin-btn" id="adminMaxSizeBtn">💪 Max Size</button>
                <button class="admin-btn" id="adminSpawnOrbsBtn">🟡 Spawn Orbs</button>
            </div>
            <div class="admin-btn-group" style="margin-top: 8px; border-top: 1px solid #374151; padding-top: 8px;">
                <select id="playerSelect" class="player-select">
                    <option value="">-- Select Player --</option>
                </select>
                <button class="admin-btn admin-btn-danger" id="adminKickBtn">👢 Kick</button>
                <button class="admin-btn admin-btn-danger" id="adminBanBtn">🔨 Ban</button>
            </div>
        </div>
        
        <div id="ui">
            <div class="stats">🎯 Score: <span id="scoreValue">0</span></div>
            <div class="stats">🏆 Best: <span id="bestValue">0</span></div>
            <div class="stats">⚔️ Kills: <span id="killsValue">0</span></div>
            <div class="stats">📏 Size: <span id="sizeValue">20</span>
                <div id="sizeBarContainer"><div id="sizeBar"></div></div>
            </div>
            <div class="stats">🎯 Lvl: <span id="levelValue">1</span> <span id="levelTitle"></span></div>
            <div class="stats">⚡ <span id="perksValue">0%</span></div>
            <div class="stats">👑 Admin: <span id="adminName"></span></div>
            <div id="zoomControl">
                <span>🔍</span>
                <button id="zoomOutBtn">-</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomInBtn">+</button>
                <button id="zoomResetBtn">Reset</button>
            </div>
            <div id="leaderboard">
                <h4>🏆 CURRENT TOP 10</h4>
                <div id="leaderboardList"></div>
            </div>
            <div id="allTimeLeaderboard">
                <h4>🏆 ALL-TIME TOP 10</h4>
                <div id="allTimeList"></div>
            </div>
        </div>
        
        <div id="chatOverlay">
            <div id="chatMessages">
                <div class="chat-system">🔔 Welcome! WASD or Arrow keys to move. Mouse to aim.</div>
                <div class="chat-system">🚀 Speed is now faster at all sizes!</div>
            </div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Type a message... /help for commands" maxlength="100" autocomplete="off">
                <button id="chatSend">Send</button>
            </div>
        </div>
        <div class="controls-hint">⬆️ WASD / Arrow Keys | 🖱️ Mouse | Scroll to zoom (2%-300%)</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({
        reconnection: true,
        reconnectionAttempts: 5,
        reconnectionDelay: 1000
    });
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};
    let myId = null;
    let myPlayer = null;
    let orbs = [];
    let currentScore = 0;
    let currentSize = 20;
    let currentLevel = 1;
    let currentTitle = '';
    let currentPerks = { speedMultiplier: 1, sizeMultiplier: 1, scoreMultiplier: 1, eatRangeMultiplier: 1 };
    let kills = 0;
    let personalBest = localStorage.getItem('ryzzPersonalBest') || 0;
    let isAdmin = false;
    
    let cameraX = 0, cameraY = 0;
    let moveDirection = { x: 0, y: 0 };
    let mouseX = null, mouseY = null;
    let useMouse = true;
    
    let zoom = 1.0;
    const MIN_ZOOM = 0.02;
    const MAX_ZOOM = 3.0;
    
    let MAP_WIDTH = 4000;
    let MAP_HEIGHT = 4000;
    
    let collectingOrbIds = new Set();
    let lastLevel = 1;
    
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const scoreElement = document.getElementById('scoreValue');
    const bestElement = document.getElementById('bestValue');
    const killsElement = document.getElementById('killsValue');
    const sizeElement = document.getElementById('sizeValue');
    const sizeBar = document.getElementById('sizeBar');
    const levelElement = document.getElementById('levelValue');
    const levelTitleElement = document.getElementById('levelTitle');
    const perksElement = document.getElementById('perksValue');
    const leaderboardList = document.getElementById('leaderboardList');
    const allTimeList = document.getElementById('allTimeList');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const adminNameSpan = document.getElementById('adminName');
    const zoomLevelSpan = document.getElementById('zoomLevel');
    const adminPanel = document.getElementById('adminPanel');
    const playerSelect = document.getElementById('playerSelect');
    
    bestElement.innerText = formatScore(personalBest);
    
    function formatScore(score) {
        if (score >= 1_000_000_000) return (score / 1_000_000_000).toFixed(1) + 'B';
        if (score >= 1_000_000) return (score / 1_000_000).toFixed(1) + 'M';
        if (score >= 1_000) return (score / 1_000).toFixed(1) + 'K';
        return score.toString();
    }
    
    function formatPerks(perks) {
        if (!perks) return '0%';
        const speed = Math.round((perks.speedMultiplier - 1) * 100);
        const size = Math.round((perks.sizeMultiplier - 1) * 100);
        const score = Math.round((perks.scoreMultiplier - 1) * 100);
        const range = Math.round((perks.eatRangeMultiplier - 1) * 100);
        if (speed === 0 && size === 0 && score === 0 && range === 0) return '0%';
        let parts = [];
        if (speed > 0) parts.push(`⚡+${speed}%`);
        if (size > 0) parts.push(`💪+${size}%`);
        if (score > 0) parts.push(`💰+${score}%`);
        if (range > 0) parts.push(`🎯+${range}%`);
        return parts.join(' ');
    }
    
    function getCellColor(level) {
        if (level >= 5000) return 'rainbow_fast';
        if (level >= 2000) return 'rainbow';
        if (level >= 1000) return '#ff00ff';
        if (level >= 500) return '#00ffff';
        if (level >= 300) return '#ff6600';
        if (level >= 200) return '#ff0000';
        if (level >= 150) return '#ff00ff';
        if (level >= 100) return '#ffd700';
        if (level >= 75) return '#ff6600';
        if (level >= 50) return '#ff4444';
        if (level >= 25) return '#ff8888';
        if (level >= 10) return '#fbbf24';
        if (level >= 5) return '#60a5fa';
        return '#3b82f6';
    }
    
    function updateSizeDisplay(radius) {
        currentSize = Math.floor(radius);
        sizeElement.innerText = currentSize;
        let percent = Math.min(100, (radius / 200) * 100);
        sizeBar.style.width = `${percent}%`;
    }
    
    function updateZoomDisplay() {
        zoomLevelSpan.innerText = `${Math.round(zoom * 100)}%`;
    }
    
    function setZoom(newZoom) {
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
        updateZoomDisplay();
    }
    
    document.getElementById('zoomInBtn').onclick = () => setZoom(zoom + 0.1);
    document.getElementById('zoomOutBtn').onclick = () => setZoom(zoom - 0.1);
    document.getElementById('zoomResetBtn').onclick = () => setZoom(1.0);
    
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        setZoom(e.deltaY < 0 ? zoom + 0.1 : zoom - 0.1);
    });
    
    const keys = {
        ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
        w: false, s: false, a: false, d: false
    };
    
    window.addEventListener('keydown', (e) => {
        const key = e.key;
        if (keys.hasOwnProperty(key)) {
            keys[key] = true;
            useMouse = false;
            e.preventDefault();
        }
        if (key === 'w') keys.w = true;
        if (key === 'a') keys.a = true;
        if (key === 's') keys.s = true;
        if (key === 'd') keys.d = true;
    });
    
    window.addEventListener('keyup', (e) => {
        const key = e.key;
        if (keys.hasOwnProperty(key)) keys[key] = false;
        if (key === 'w') keys.w = false;
        if (key === 'a') keys.a = false;
        if (key === 's') keys.s = false;
        if (key === 'd') keys.d = false;
    });
    
    function getMoveVector() {
        let moveX = 0, moveY = 0;
        if (keys.ArrowUp || keys.w) moveY -= 1;
        if (keys.ArrowDown || keys.s) moveY += 1;
        if (keys.ArrowLeft || keys.a) moveX -= 1;
        if (keys.ArrowRight || keys.d) moveX += 1;
        if (moveX !== 0 || moveY !== 0) {
            const len = Math.hypot(moveX, moveY);
            moveX /= len;
            moveY /= len;
        }
        return { x: moveX, y: moveY };
    }
    
    canvas.addEventListener('mousemove', (e) => {
        useMouse = true;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        
        mouseX = (canvasX / zoom) + cameraX;
        mouseY = (canvasY / zoom) + cameraY;
        mouseX = Math.min(Math.max(mouseX, 0), MAP_WIDTH);
        mouseY = Math.min(Math.max(mouseY, 0), MAP_HEIGHT);
    });
    
    function addChatMessage(sender, message, isAdmin = false, isSystem = false) {
        const div = document.createElement('div');
        if (isSystem) {
            div.innerHTML = `<span class="chat-system">🔔 ${message}</span>`;
        } else if (isAdmin) {
            div.innerHTML = `<span class="chat-admin">👑 ${sender}:</span> ${message}`;
        } else {
            div.innerHTML = `<span>💬 ${sender}:</span> ${message}`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        while (chatMessages.children.length > 50) {
            chatMessages.removeChild(chatMessages.firstChild);
        }
    }
    
    function sendMessage() {
        const text = chatInput.value.trim();
        if (text === '') return;
        socket.emit('chatMessage', { message: text });
        chatInput.value = '';
        chatInput.focus();
    }
    
    chatSend.onclick = sendMessage;
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    function updatePlayerSelect() {
        playerSelect.innerHTML = '<option value="">-- Select Player --</option>';
        for (const id in players) {
            if (id !== myId && !players[id].isAdmin) {
                const option = document.createElement('option');
                option.value = players[id].username;
                option.textContent = `${players[id].username} (Lvl ${players[id].level})`;
                playerSelect.appendChild(option);
            }
        }
    }
    
    function setupAdminButtons() {
        document.querySelectorAll('.admin-btn[data-points]').forEach(btn => {
            btn.addEventListener('click', () => {
                const points = parseInt(btn.getAttribute('data-points'));
                socket.emit('adminGivePoints', points);
                addChatMessage('System', `👑 Admin gave +${formatScore(points)} points!`, false, true);
            });
        });
        
        document.getElementById('adminHealBtn')?.addEventListener('click', () => {
            socket.emit('adminHeal');
            addChatMessage('System', `💚 Admin healed you!`, false, true);
        });
        
        document.getElementById('adminMaxSizeBtn')?.addEventListener('click', () => {
            socket.emit('adminMaxSize');
            addChatMessage('System', `💪 Admin set to max size!`, false, true);
        });
        
        document.getElementById('adminSpawnOrbsBtn')?.addEventListener('click', () => {
            socket.emit('adminSpawnOrbs');
            addChatMessage('System', `🟡 Admin spawned extra orbs!`, false, true);
        });
        
        document.getElementById('adminKickBtn')?.addEventListener('click', () => {
            const target = playerSelect.value;
            if (!target) {
                addChatMessage('System', `⚠️ Select a player first!`, false, true);
                return;
            }
            socket.emit('adminKickPlayer', target);
            addChatMessage('System', `👢 Admin kicked ${target}!`, false, true);
        });
        
        document.getElementById('adminBanBtn')?.addEventListener('click', () => {
            const target = playerSelect.value;
            if (!target) {
                addChatMessage('System', `⚠️ Select a player first!`, false, true);
                return;
            }
            socket.emit('adminBanPlayer', target);
            addChatMessage('System', `🔨 Admin banned ${target}!`, false, true);
        });
    }
    
    joinBtn.onclick = () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (username === '') {
            errorMsg.innerText = 'Please enter a username';
            return;
        }
        
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        socket.emit('joinGame', { username: username, password: password });
        
        function gameLoop() {
            if (myPlayer) {
                movePlayer();
                checkCollisions();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    };
    
    socket.on('allTimeLeaderboard', (leaderboard) => {
        let html = '';
        for (let i = 0; i < leaderboard.length; i++) {
            const p = leaderboard[i];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
            if (p.username === 'RYZZ') {
                html += `<div><span class="leaderboard-admin">${medal} ${p.username} - ${formatScore(p.score)}</span></div>`;
            } else {
                html += `<div>${medal} ${p.username} - ${formatScore(p.score)}</div>`;
            }
        }
        if (leaderboard.length === 0) {
            html = '<div style="color:#666;">Be the first!</div>';
        }
        allTimeList.innerHTML = html;
    });
    
    socket.on('currentPlayers', (serverPlayers) => {
        players = serverPlayers;
        updatePlayerSelect();
        for (let id in players) {
            if (players[id].username === usernameInput.value.trim()) {
                myId = id;
                myPlayer = players[id];
                isAdmin = myPlayer.isAdmin;
                if (myPlayer.isAdmin) {
                    adminNameSpan.innerText = myPlayer.username;
                    adminNameSpan.className = 'admin-glowing';
                    adminPanel.classList.remove('hidden');
                    setupAdminButtons();
                    updatePlayerSelect();
                } else {
                    adminNameSpan.innerText = 'None';
                    adminNameSpan.className = '';
                    adminPanel.classList.add('hidden');
                }
                updateSizeDisplay(myPlayer.radius);
                currentLevel = myPlayer.level || 1;
                currentTitle = myPlayer.title || '🍼 Newbie';
                currentPerks = myPlayer.perks || { speedMultiplier: 1, sizeMultiplier: 1, scoreMultiplier: 1, eatRangeMultiplier: 1 };
                levelElement.innerText = currentLevel;
                levelTitleElement.innerText = currentTitle;
                perksElement.innerHTML = formatPerks(currentPerks);
                if (myPlayer.isAdmin) {
                    addChatMessage('System', '👑 You are ADMIN! Use the panel on the right!', false, true);
                }
                kills = myPlayer.kills || 0;
                killsElement.innerText = kills;
            }
        }
    });
    
    socket.on('currentBots', (serverBots) => {
        for (const id in serverBots) {
            players[id] = { ...serverBots[id], isBot: true };
        }
        updatePlayerSelect();
    });
    
    socket.on('updateBots', (serverBots) => {
        for (const id in players) {
            if (players[id].isBot && !serverBots[id]) {
                delete players[id];
            }
        }
        for (const id in serverBots) {
            players[id] = { ...serverBots[id], isBot: true };
        }
        updatePlayerSelect();
    });
    
    socket.on('currentOrbs', (serverOrbs) => {
        orbs = serverOrbs;
        collectingOrbIds.clear();
    });
    
    socket.on('mapSizeUpdate', (data) => {
        MAP_WIDTH = data.width;
        MAP_HEIGHT = data.height;
    });
    
    socket.on('newPlayer', (playerData) => {
        players[playerData.id] = playerData;
        updatePlayerSelect();
        addChatMessage('System', `${playerData.username} joined!`, false, true);
    });
    
    socket.on('playerMoved', (playerData) => {
        if (players[playerData.id]) {
            players[playerData.id].x = playerData.x;
            players[playerData.id].y = playerData.y;
        }
    });
    
    socket.on('playerDisconnected', (playerId) => {
        if (players[playerId]) {
            addChatMessage('System', `${players[playerId].username} left`, false, true);
            delete players[playerId];
            updatePlayerSelect();
        }
    });
    
    socket.on('leaderboardUpdate', (leaderboard) => {
        let html = '';
        for (let i = 0; i < leaderboard.length; i++) {
            const p = leaderboard[i];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
            if (p.username === 'RYZZ') {
