<!DOCTYPE html>
<html>
<head>
    <title>RYZZ.io - Multiplayer Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #joinScreen, #gameScreen {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
        }
        #joinScreen h1 {
            color: #fbbf24;
            margin-bottom: 20px;
        }
        #joinScreen input {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 250px;
            margin-bottom: 10px;
        }
        #joinScreen button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #errorMsg {
            color: #ef4444;
            margin-top: 10px;
        }
        #gameContainer {
            background: #111827;
            padding: 10px;
            border-radius: 12px;
            position: relative;
        }
        canvas {
            border: 2px solid #1f2937;
            display: block;
            border-radius: 8px;
            cursor: crosshair;
            touch-action: none;
        }
        #ui {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }
        .stats, #leaderboard {
            background: #1f2937;
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        #leaderboard { min-width: 200px; }
        #leaderboard h4 { margin-bottom: 5px; color: #fbbf24; }
        #orbLegend {
            background: #1f2937;
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            display: flex;
            gap: 15px;
        }
        .orb-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 4px;
        }
        #zoomControl {
            background: #1f2937;
            padding: 5px 12px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #zoomControl button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        #zoomControl button:hover {
            background: #2563eb;
        }
        #zoomLevel {
            min-width: 45px;
            text-align: center;
        }
        #chatContainer {
            margin-top: 10px;
            background: #1f2937;
            border-radius: 8px;
        }
        #chatMessages {
            height: 120px;
            overflow-y: auto;
            background: #0a0f1e;
            border-radius: 8px 8px 0 0;
            padding: 8px;
            font-size: 13px;
        }
        #chatInputArea {
            display: flex;
            padding: 8px;
            gap: 8px;
        }
        #chatInput {
            flex: 1;
            background: #111827;
            border: 1px solid #374151;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }
        #chatSend {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .chat-admin { color: #fbbf24; font-weight: bold; }
        .chat-system { color: #ef4444; font-style: italic; }
        .hidden { display: none; }
        .admin-bold {
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 2px #ffffff;
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>RYZZ.io</h1>
    <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
    <input type="password" id="passwordInput" placeholder="Admin password" style="margin-top: 10px;">
    <br>
    <button id="joinBtn">Join Game</button>
    <div id="errorMsg"></div>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        <div id="ui">
            <div class="stats">🎯 Score: <span id="scoreValue">0</span></div>
            <div class="stats">👑 Admin: <span id="adminName" class="admin-bold"></span></div>
            <div id="orbLegend">
                <div><span class="orb-dot" style="background: #fbbf24;"></span> 10</div>
                <div><span class="orb-dot" style="background: #22c55e;"></span> 25</div>
                <div><span class="orb-dot" style="background: #3b82f6;"></span> 50</div>
                <div><span class="orb-dot" style="background: #a855f7;"></span> 100</div>
            </div>
            <div id="zoomControl">
                <span>🔍</span>
                <button id="zoomOutBtn">-</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomInBtn">+</button>
                <button id="zoomResetBtn">Reset</button>
            </div>
            <div id="leaderboard">
                <h4>🏆 LEADERBOARD</h4>
                <div id="leaderboardList"></div>
            </div>
        </div>
        <div id="chatContainer">
            <div id="chatMessages"></div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Type message... Admin: /help" autocomplete="off">
                <button id="chatSend">Send</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // Disable page zoom
    window.addEventListener('wheel', (e) => {
        if (e.ctrlKey || e.metaKey) e.preventDefault();
    }, { passive: false });
    window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '0')) e.preventDefault();
    });

    const socket = io();
    
    let players = {};
    let myId = null;
    let myPlayer = null;
    let cameraX = 0, cameraY = 0;
    let mouseX = 0, mouseY = 0;
    let orbs = [];
    let currentScore = 0;
    
    let zoom = 1.0;
    const MIN_ZOOM = 0.5;
    const MAX_ZOOM = 2.0;
    let canvasWidth = 1200;
    let canvasHeight = 800;
    
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('scoreValue');
    const leaderboardList = document.getElementById('leaderboardList');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const adminNameSpan = document.getElementById('adminName');
    const zoomLevelSpan = document.getElementById('zoomLevel');
    
    function updateCanvasSize() {
        canvas.width = canvasWidth * zoom;
        canvas.height = canvasHeight * zoom;
        canvas.style.width = `${canvasWidth * zoom}px`;
        canvas.style.height = `${canvasHeight * zoom}px`;
        zoomLevelSpan.innerText = `${Math.round(zoom * 100)}%`;
    }
    
    function setZoom(newZoom) {
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
        updateCanvasSize();
        if (myPlayer) { updateCamera(); draw(); }
    }
    
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        setZoom(e.deltaY < 0 ? zoom + 0.1 : zoom - 0.1);
    });
    document.getElementById('zoomInBtn').onclick = () => setZoom(zoom + 0.1);
    document.getElementById('zoomOutBtn').onclick = () => setZoom(zoom - 0.1);
    document.getElementById('zoomResetBtn').onclick = () => setZoom(1.0);
    
    function addChatMessage(sender, message, isSystem = false, isAdmin = false) {
        const div = document.createElement('div');
        if (isSystem) div.innerHTML = `<span class="chat-system">🔔 ${message}</span>`;
        else if (isAdmin) div.innerHTML = `<span class="chat-admin">👑 ${sender}:</span> <span style="color:white"> ${message}</span>`;
        else div.innerHTML = `<span>💬 ${sender}:</span> <span style="color:#ccc"> ${message}</span>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        while (chatMessages.children.length > 50) chatMessages.removeChild(chatMessages.firstChild);
    }
    
    function sendChat() {
        const text = chatInput.value.trim();
        if (!text) return;
        socket.emit('chatMessage', { message: text });
        chatInput.value = '';
        chatInput.focus();
    }
    chatSend.onclick = sendChat;
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendChat(); } });
    
    joinBtn.onclick = () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (!username) { errorMsg.innerText = 'Please enter a username'; return; }
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        socket.emit('joinGame', { username: username, password: password });
        requestAnimationFrame(gameLoop);
    };
    
    socket.on('currentPlayers', (serverPlayers) => {
        players = serverPlayers;
        for (const id in players) {
            if (players[id].username === usernameInput.value.trim()) {
                myId = id;
                myPlayer = players[id];
                if (myPlayer.isAdmin) {
                    addChatMessage('System', '👑 You are ADMIN! Type /help', true);
                    adminNameSpan.innerHTML = myPlayer.username;
                    adminNameSpan.style.fontWeight = 'bold';
                    adminNameSpan.style.color = '#ffffff';
                    adminNameSpan.style.textShadow = '0 0 2px #ffffff';
                } else {
                    adminNameSpan.innerHTML = 'None';
                }
            }
        }
    });
    
    // 🤖 Handle bots from server
    socket.on('currentBots', (serverBots) => {
        for (const id in serverBots) {
            const bot = serverBots[id];
            players[id] = {
                ...bot,
                isBot: true
            };
        }
    });
    
    socket.on('updateBots', (serverBots) => {
        // Remove old bots
        for (const id in players) {
            if (players[id].isBot && !serverBots[id]) {
                delete players[id];
            }
        }
        // Add/update bots
        for (const id in serverBots) {
            const bot = serverBots[id];
            players[id] = {
                ...bot,
                isBot: true
            };
        }
    });
    
    socket.on('currentOrbs', (serverOrbs) => { orbs = serverOrbs; });
    socket.on('nameRejected', (msg) => { alert(msg); window.location.reload(); });
    socket.on('newPlayer', (playerData) => { players[playerData.id] = playerData; addChatMessage('System', `${playerData.username} joined!`, true); });
    socket.on('playerMoved', (playerData) => { if (players[playerData.id]) { players[playerData.id].x = playerData.x; players[playerData.id].y = playerData.y; } });
    socket.on('playerDisconnected', (playerId) => { if (players[playerId]) { addChatMessage('System', `${players[playerId].username} left`, true); delete players[playerId]; } });
    
    socket.on('leaderboardUpdate', (leaderboard) => {
        let html = '';
        for (let i = 0; i < leaderboard.length; i++) {
            const p = leaderboard[i];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
            if (p.username === 'RYZZ') {
                html += `<div>${medal} <strong style="color:#ffffff;text-shadow:0 0 2px #fff;">${p.username}</strong> - ${p.score}</div>`;
            } else {
                html += `<div>${medal} ${p.username} - ${p.score}</div>`;
            }
        }
        leaderboardList.innerHTML = html;
    });
    
    socket.on('scoreUpdate', (data) => {
        if (players[data.id]) { players[data.id].score = data.score; players[data.id].radius = data.radius; }
        if (data.id === myId) { currentScore = data.score; scoreElement.innerText = currentScore; if (myPlayer) myPlayer.radius = data.radius; }
    });
    socket.on('orbCollected', (orbId) => { const index = orbs.findIndex(o => o.id === orbId); if (index !== -1) orbs.splice(index, 1); });
    socket.on('chatMessage', (data) => { addChatMessage(data.username, data.message, data.isSystem, data.isAdmin); });
    socket.on('adminConfirm', (msg) => addChatMessage('System', msg, true));
    socket.on('kicked', (msg) => { alert(msg); window.location.reload(); });
    
    canvas.addEventListener('mousemove', (e) => {
        if (!myPlayer) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        mouseX = (canvasX / zoom) + cameraX;
        mouseY = (canvasY / zoom) + cameraY;
        mouseX = Math.min(Math.max(mouseX, 0), 2400);
        mouseY = Math.min(Math.max(mouseY, 0), 1600);
    });
    
    function movePlayer() {
        if (!myPlayer) return;
        const dx = mouseX - myPlayer.x;
        const dy = mouseY - myPlayer.y;
        const distance = Math.hypot(dx, dy);
        if (distance > 1) {
            const speed = Math.min(8, 200 / myPlayer.radius);
            myPlayer.x += (dx / distance) * speed;
            myPlayer.y += (dy / distance) * speed;
        }
        myPlayer.x = Math.min(Math.max(myPlayer.x, myPlayer.radius + 5), 2400 - myPlayer.radius - 5);
        myPlayer.y = Math.min(Math.max(myPlayer.y, myPlayer.radius + 5), 1600 - myPlayer.radius - 5);
        socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
    }
    
    function checkOrbCollisions() {
        if (!myPlayer) return;
        for (let i = 0; i < orbs.length; i++) {
            const orb = orbs[i];
            const dist = Math.hypot(myPlayer.x - orb.x, myPlayer.y - orb.y);
            if (dist < myPlayer.radius + orb.radius) {
                socket.emit('collectOrb', orb.id);
                break;
            }
        }
    }
    
    // Player eating collision
    function checkPlayerCollisions() {
        if (!myPlayer) return;
        
        for (const id in players) {
            if (id === myId) continue;
            const other = players[id];
            if (other.isBot && other.isBot === true) {
                // Bot collision handled by server, just skip to avoid double processing
                continue;
            }
            
            const dist = Math.hypot(myPlayer.x - other.x, myPlayer.y - other.y);
            const combinedRadius = myPlayer.radius + other.radius;
            
            if (dist < combinedRadius) {
                if (myPlayer.radius > other.radius) {
                    socket.emit('eatPlayer', id);
                    addChatMessage('System', `🍽️ You ate ${other.username}!`, true);
                } else if (other.radius > myPlayer.radius) {
                    socket.emit('eatPlayer', myId);
                    addChatMessage('System', `💀 You were eaten by ${other.username}!`, true);
                    myPlayer.x = Math.random() * 2200 + 100;
                    myPlayer.y = Math.random() * 1400 + 100;
                    socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
                } else {
                    const angle = Math.atan2(myPlayer.y - other.y, myPlayer.x - other.x);
                    myPlayer.x += Math.cos(angle) * 15;
                    myPlayer.y += Math.sin(angle) * 15;
                }
            }
        }
    }
    
    function updateCamera() {
        if (!myPlayer) return;
        const effectiveWidth = canvas.width / zoom;
        const effectiveHeight = canvas.height / zoom;
        cameraX = myPlayer.x - effectiveWidth / 2;
        cameraY = myPlayer.y - effectiveHeight / 2;
        cameraX = Math.min(Math.max(cameraX, 0), 2400 - effectiveWidth);
        cameraY = Math.min(Math.max(cameraY, 0), 1600 - effectiveHeight);
    }
    
    function draw() {
        if (!myPlayer) return;
        updateCamera();
        ctx.fillStyle = '#0a0f1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw orbs
        for (const orb of orbs) {
            const screenX = (orb.x - cameraX) * zoom;
            const screenY = (orb.y - cameraY) * zoom;
            const radius = orb.radius * zoom;
            if (screenX + radius > 0 && screenX - radius < canvas.width && screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                ctx.fillStyle = orb.color || '#fbbf24';
                ctx.fill();
                if (orb.value >= 50) {
                    ctx.shadowBlur = 8 * zoom;
                    ctx.shadowColor = orb.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }
        
        // Draw all players (including bots)
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            const screenX = (p.x - cameraX) * zoom;
            const screenY = (p.y - cameraY) * zoom;
            const radius = p.radius * zoom;
            if (screenX + radius > 0 && screenX - radius < canvas.width && screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                // Bots are purple, players are red
                if (p.isBot) {
                    ctx.fillStyle = '#a855f7'; // Purple for bots
                } else if (p.radius > myPlayer.radius) {
                    ctx.fillStyle = '#ff4444'; // Bigger player = dark red
                } else {
                    ctx.fillStyle = '#ef4444'; // Smaller player = normal red
                }
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = `${Math.max(10, 10 * zoom)}px Arial`;
                const displayName = p.isBot ? '🤖 ' + p.username : p.username;
                ctx.fillText(displayName, screenX - (25 * zoom), screenY - (15 * zoom));
                
                // Danger indicator for bots that are bigger
                if (p.isBot && p.radius > myPlayer.radius * 1.2) {
                    ctx.fillStyle = '#ff0000';
                    ctx.font = `${14 * zoom}px Arial`;
                    ctx.fillText('⚠️', screenX + 15, screenY - 10);
                }
            }
        }
        
        // Draw my player
        const myScreenX = (myPlayer.x - cameraX) * zoom;
        const myScreenY = (myPlayer.y - cameraY) * zoom;
        const myRadius = myPlayer.radius * zoom;
        ctx.beginPath();
        ctx.arc(myScreenX, myScreenY, myRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3 * zoom;
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(12, myRadius * 0.6)}px Arial`;
        ctx.fillText(myPlayer.username, myScreenX - (18 * zoom), myScreenY - (12 * zoom));
    }
    
    function gameLoop() {
        if (myPlayer) {
            movePlayer();
            checkOrbCollisions();
            checkPlayerCollisions();
            draw();
        }
        requestAnimationFrame(gameLoop);
    }
    
    updateCanvasSize();
</script>
</body>
</html>
