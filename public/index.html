<!DOCTYPE html>
<html>
<head>
    <title>RYZZ.io - Bots Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #joinScreen, #gameScreen {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
        }
        #joinScreen h1 {
            color: #fbbf24;
            margin-bottom: 20px;
        }
        #joinScreen input {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 250px;
            margin-bottom: 10px;
        }
        #joinScreen button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #errorMsg {
            color: #ef4444;
            margin-top: 10px;
        }
        #gameContainer {
            position: relative;
            display: inline-block;
        }
        canvas {
            border: 2px solid #1f2937;
            display: block;
            border-radius: 8px;
            cursor: crosshair;
        }
        /* CHAT OVERLAY - INSIDE GAME AREA */
        #chatOverlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 300px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #374151;
            z-index: 10;
        }
        #chatMessages {
            height: 120px;
            overflow-y: auto;
            padding: 8px;
            font-size: 12px;
            color: #ccc;
        }
        #chatMessages div {
            margin-bottom: 4px;
            word-wrap: break-word;
        }
        #chatInputArea {
            display: flex;
            padding: 6px;
            gap: 6px;
            border-top: 1px solid #374151;
        }
        #chatInput {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 6px 8px;
            border-radius: 6px;
            outline: none;
            font-size: 12px;
        }
        #chatInput:focus {
            border-color: #fbbf24;
        }
        #chatSend {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        #chatSend:hover {
            background: #2563eb;
        }
        .chat-admin {
            color: #fbbf24;
            font-weight: bold;
        }
        .chat-system {
            color: #ef4444;
            font-style: italic;
        }
        /* UI Panel - Top */
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 10;
            pointer-events: none;
        }
        .stats, #leaderboard, #zoomControl {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            border: 1px solid #374151;
        }
        #leaderboard {
            min-width: 160px;
        }
        #leaderboard h4 {
            margin-bottom: 4px;
            color: #fbbf24;
            font-size: 12px;
        }
        #leaderboardList {
            max-height: 100px;
            overflow-y: auto;
            font-size: 11px;
        }
        #zoomControl button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            pointer-events: auto;
        }
        #zoomLevel {
            font-size: 11px;
            min-width: 35px;
            text-align: center;
        }
        .hidden {
            display: none;
        }
        .score-pop {
            position: fixed;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.5s ease-out forwards;
            z-index: 200;
            font-size: 18px;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>👑 RYZZ.io</h1>
    <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
    <input type="password" id="passwordInput" placeholder="Admin password" style="margin-top: 10px;">
    <br>
    <button id="joinBtn">Join Game</button>
    <div id="errorMsg"></div>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <!-- UI Overlay on top of canvas -->
        <div id="ui">
            <div class="stats">🎯 Score: <span id="scoreValue">0</span></div>
            <div class="stats">👑 Admin: <span id="adminName"></span></div>
            <div id="zoomControl">
                <span>🔍</span>
                <button id="zoomOutBtn">-</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomInBtn">+</button>
                <button id="zoomResetBtn">Reset</button>
            </div>
            <div id="leaderboard">
                <h4>🏆 LEADERBOARD</h4>
                <div id="leaderboardList"></div>
            </div>
        </div>
        
        <!-- Chat Overlay - Bottom Left Inside Game -->
        <div id="chatOverlay">
            <div id="chatMessages">
                <div class="chat-system">🔔 Welcome! Type a message to chat.</div>
            </div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Type a message..." maxlength="100" autocomplete="off">
                <button id="chatSend">Send</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({
        reconnection: true,
        reconnectionAttempts: 5,
        reconnectionDelay: 1000
    });
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};
    let myId = null;
    let myPlayer = null;
    let orbs = [];
    let currentScore = 0;
    
    let cameraX = 0, cameraY = 0;
    let mouseX = 0, mouseY = 0;
    let zoom = 1.0;
    const MIN_ZOOM = 0.3;
    const MAX_ZOOM = 2.0;
    
    const MAP_WIDTH = 4000;
    const MAP_HEIGHT = 4000;
    
    let collectingOrbIds = new Set();
    
    // DOM elements
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const scoreElement = document.getElementById('scoreValue');
    const leaderboardList = document.getElementById('leaderboardList');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const adminNameSpan = document.getElementById('adminName');
    const zoomLevelSpan = document.getElementById('zoomLevel');
    
    function showScorePopup(x, y, points) {
        const rect = canvas.getBoundingClientRect();
        const div = document.createElement('div');
        div.className = 'score-pop';
        div.innerText = `+${points}`;
        div.style.left = `${rect.left + x}px`;
        div.style.top = `${rect.top + y}px`;
        div.style.color = '#fbbf24';
        div.style.fontWeight = 'bold';
        div.style.fontSize = '20px';
        div.style.textShadow = '0 0 3px black';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 500);
    }
    
    function updateZoomDisplay() {
        zoomLevelSpan.innerText = `${Math.round(zoom * 100)}%`;
    }
    
    function setZoom(newZoom) {
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
        updateZoomDisplay();
    }
    
    document.getElementById('zoomInBtn').onclick = () => setZoom(zoom + 0.1);
    document.getElementById('zoomOutBtn').onclick = () => setZoom(zoom - 0.1);
    document.getElementById('zoomResetBtn').onclick = () => setZoom(1.0);
    
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        setZoom(e.deltaY < 0 ? zoom + 0.1 : zoom - 0.1);
    });
    
    function addChatMessage(sender, message, isAdmin = false, isSystem = false) {
        const div = document.createElement('div');
        if (isSystem) {
            div.innerHTML = `<span class="chat-system">🔔 ${message}</span>`;
        } else if (isAdmin) {
            div.innerHTML = `<span class="chat-admin">👑 ${sender}:</span> ${message}`;
        } else {
            div.innerHTML = `<span>💬 ${sender}:</span> ${message}`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        while (chatMessages.children.length > 50) {
            chatMessages.removeChild(chatMessages.firstChild);
        }
    }
    
    function sendMessage() {
        const text = chatInput.value.trim();
        if (text === '') return;
        socket.emit('chatMessage', { message: text });
        chatInput.value = '';
        chatInput.focus();
    }
    
    chatSend.onclick = sendMessage;
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    joinBtn.onclick = () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (username === '') {
            errorMsg.innerText = 'Please enter a username';
            return;
        }
        
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        socket.emit('joinGame', { username: username, password: password });
        
        function gameLoop() {
            if (myPlayer) {
                movePlayer();
                checkCollisions();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    };
    
    // Socket events
    socket.on('currentPlayers', (serverPlayers) => {
        players = serverPlayers;
        for (let id in players) {
            if (players[id].username === usernameInput.value.trim()) {
                myId = id;
                myPlayer = players[id];
                adminNameSpan.innerText = myPlayer.isAdmin ? myPlayer.username : 'None';
                if (myPlayer.isAdmin) {
                    addChatMessage('System', 'You are ADMIN! Type /help', false, true);
                }
            }
        }
    });
    
    socket.on('currentBots', (serverBots) => {
        for (const id in serverBots) {
            players[id] = { ...serverBots[id], isBot: true };
        }
    });
    
    socket.on('updateBots', (serverBots) => {
        for (const id in players) {
            if (players[id].isBot && !serverBots[id]) {
                delete players[id];
            }
        }
        for (const id in serverBots) {
            players[id] = { ...serverBots[id], isBot: true };
        }
    });
    
    socket.on('currentOrbs', (serverOrbs) => {
        orbs = serverOrbs;
        collectingOrbIds.clear();
    });
    
    socket.on('newPlayer', (playerData) => {
        players[playerData.id] = playerData;
        addChatMessage('System', `${playerData.username} joined!`, false, true);
    });
    
    socket.on('playerMoved', (playerData) => {
        if (players[playerData.id]) {
            players[playerData.id].x = playerData.x;
            players[playerData.id].y = playerData.y;
        }
    });
    
    socket.on('playerDisconnected', (playerId) => {
        if (players[playerId]) {
            addChatMessage('System', `${players[playerId].username} left`, false, true);
            delete players[playerId];
        }
    });
    
    socket.on('leaderboardUpdate', (leaderboard) => {
        let html = '';
        for (let i = 0; i < leaderboard.length; i++) {
            const p = leaderboard[i];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
            html += `<div>${medal} ${p.username} - ${p.score}</div>`;
        }
        leaderboardList.innerHTML = html;
    });
    
    socket.on('scoreUpdate', (data) => {
        if (players[data.id]) {
            players[data.id].score = data.score;
            players[data.id].radius = data.radius;
        }
        if (data.id === myId) {
            if (data.score > currentScore) {
                currentScore = data.score;
                scoreElement.innerText = currentScore;
            }
            if (myPlayer) myPlayer.radius = data.radius;
        }
    });
    
    socket.on('orbCollected', (orbId) => {
        collectingOrbIds.delete(orbId);
        const index = orbs.findIndex(o => o.id === orbId);
        if (index !== -1) {
            orbs.splice(index, 1);
        }
    });
    
    socket.on('orbCollectionFailed', (orbId) => {
        collectingOrbIds.delete(orbId);
    });
    
    socket.on('chatMessage', (data) => {
        addChatMessage(data.username, data.message, data.isAdmin);
    });
    
    socket.on('adminConfirm', (isAdmin) => {
        if (isAdmin && myPlayer) {
            myPlayer.isAdmin = true;
            adminNameSpan.innerText = myPlayer.username;
            addChatMessage('System', 'You are ADMIN!', false, true);
        }
    });
    
    socket.on('nameRejected', (msg) => {
        alert(msg);
        window.location.reload();
    });
    
    socket.on('kicked', (msg) => {
        alert(msg);
        window.location.reload();
    });
    
    canvas.addEventListener('mousemove', (e) => {
        if (!myPlayer) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        
        mouseX = (canvasX / zoom) + cameraX;
        mouseY = (canvasY / zoom) + cameraY;
        mouseX = Math.min(Math.max(mouseX, 0), MAP_WIDTH);
        mouseY = Math.min(Math.max(mouseY, 0), MAP_HEIGHT);
    });
    
    function movePlayer() {
        if (!myPlayer) return;
        const dx = mouseX - myPlayer.x;
        const dy = mouseY - myPlayer.y;
        const distance = Math.hypot(dx, dy);
        if (distance > 1) {
            const speed = Math.min(6, 150 / myPlayer.radius);
            myPlayer.x += (dx / distance) * speed;
            myPlayer.y += (dy / distance) * speed;
        }
        myPlayer.x = Math.min(Math.max(myPlayer.x, myPlayer.radius + 5), MAP_WIDTH - myPlayer.radius - 5);
        myPlayer.y = Math.min(Math.max(myPlayer.y, myPlayer.radius + 5), MAP_HEIGHT - myPlayer.radius - 5);
        socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
    }
    
    function checkCollisions() {
        if (!myPlayer) return;
        
        for (let i = 0; i < orbs.length; i++) {
            const orb = orbs[i];
            if (collectingOrbIds.has(orb.id)) continue;
            
            const dist = Math.hypot(myPlayer.x - orb.x, myPlayer.y - orb.y);
            if (dist < myPlayer.radius + orb.radius) {
                collectingOrbIds.add(orb.id);
                socket.emit('collectOrb', orb.id);
                orbs.splice(i, 1);
                currentScore += orb.value;
                scoreElement.innerText = currentScore;
                if (myPlayer) myPlayer.score = currentScore;
                
                const screenX = (orb.x - cameraX) * zoom;
                const screenY = (orb.y - cameraY) * zoom;
                showScorePopup(screenX, screenY, orb.value);
                break;
            }
        }
        
        for (const id in players) {
            if (id === myId) continue;
            const other = players[id];
            if (other.isBot) continue;
            
            const dist = Math.hypot(myPlayer.x - other.x, myPlayer.y - other.y);
            if (dist < myPlayer.radius + other.radius) {
                if (myPlayer.radius > other.radius && !other.isAdmin) {
                    socket.emit('eatPlayer', id);
                    addChatMessage('System', `🍽️ You ate ${other.username}!`, false, true);
                } else if (other.radius > myPlayer.radius) {
                    socket.emit('eatPlayer', myId);
                    addChatMessage('System', `💀 You were eaten by ${other.username}!`, false, true);
                    myPlayer.x = Math.random() * (MAP_WIDTH - 400) + 200;
                    myPlayer.y = Math.random() * (MAP_HEIGHT - 400) + 200;
                    socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
                } else {
                    const angle = Math.atan2(myPlayer.y - other.y, myPlayer.x - other.x);
                    myPlayer.x += Math.cos(angle) * 20;
                    myPlayer.y += Math.sin(angle) * 20;
                }
            }
        }
    }
    
    function updateCamera() {
        if (!myPlayer) return;
        const effectiveWidth = canvas.width / zoom;
        const effectiveHeight = canvas.height / zoom;
        cameraX = myPlayer.x - effectiveWidth / 2;
        cameraY = myPlayer.y - effectiveHeight / 2;
        cameraX = Math.min(Math.max(cameraX, 0), MAP_WIDTH - effectiveWidth);
        cameraY = Math.min(Math.max(cameraY, 0), MAP_HEIGHT - effectiveHeight);
    }
    
    function draw() {
        if (!myPlayer) return;
        updateCamera();
        
        ctx.fillStyle = '#0a0f1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw grid
        ctx.strokeStyle = '#1a2340';
        ctx.lineWidth = 1;
        const gridSize = 200;
        const startX = Math.floor(cameraX / gridSize) * gridSize;
        const startY = Math.floor(cameraY / gridSize) * gridSize;
        for (let x = startX; x < cameraX + canvas.width / zoom; x += gridSize) {
            const screenX = (x - cameraX) * zoom;
            ctx.beginPath();
            ctx.moveTo(screenX, 0);
            ctx.lineTo(screenX, canvas.height);
            ctx.stroke();
        }
        for (let y = startY; y < cameraY + canvas.height / zoom; y += gridSize) {
            const screenY = (y - cameraY) * zoom;
            ctx.beginPath();
            ctx.moveTo(0, screenY);
            ctx.lineTo(canvas.width, screenY);
            ctx.stroke();
        }
        
        // Draw orbs
        for (const orb of orbs) {
            const screenX = (orb.x - cameraX) * zoom;
            const screenY = (orb.y - cameraY) * zoom;
            const radius = orb.radius * zoom;
            if (screenX + radius > 0 && screenX - radius < canvas.width &&
                screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                ctx.fillStyle = orb.color;
                ctx.fill();
            }
        }
        
        // Draw players
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            const screenX = (p.x - cameraX) * zoom;
            const screenY = (p.y - cameraY) * zoom;
            const radius = p.radius * zoom;
            if (screenX + radius > 0 && screenX - radius < canvas.width &&
                screenY + radius > 0 && screenY - radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                if (p.isBot) {
                    ctx.fillStyle = '#a855f7';
                } else if (p.isAdmin) {
                    ctx.fillStyle = '#fbbf24';
                } else if (p.radius > myPlayer.radius) {
                    ctx.fillStyle = '#ff4444';
                } else {
                    ctx.fillStyle = '#ef4444';
                }
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = `${Math.max(10, 12 * zoom)}px Arial`;
                const displayName = p.isBot ? `🤖 ${p.username}` : p.username;
                ctx.fillText(displayName, screenX - 25 * zoom, screenY - 15 * zoom);
                
                if (p.isBot && p.radius > myPlayer.radius * 1.2) {
                    ctx.fillStyle = '#ff0000';
                    ctx.font = `${14 * zoom}px Arial`;
                    ctx.fillText('⚠️', screenX + 15 * zoom, screenY - 10 * zoom);
                }
            }
        }
        
        // Draw my player
        const myScreenX = (myPlayer.x - cameraX) * zoom;
        const myScreenY = (myPlayer.y - cameraY) * zoom;
        const myRadius = myPlayer.radius * zoom;
        ctx.beginPath();
        ctx.arc(myScreenX, myScreenY, myRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3 * zoom;
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(12, myRadius * 0.5)}px Arial`;
        ctx.fillText(myPlayer.username, myScreenX - 18 * zoom, myScreenY - 12 * zoom);
        if (myPlayer.isAdmin) {
            ctx.fillStyle = '#fbbf24';
            ctx.font = `${Math.max(12, 16 * zoom)}px Arial`;
            ctx.fillText('👑', myScreenX + 5 * zoom, myScreenY - 15 * zoom);
        }
    }
</script>
</body>
</html>
